<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Intelligence · Artenspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.13);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.13);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.13);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.13);
  --orange:#f05423;
  --teal:#14b8a6;--teal-dim:rgba(20,184,166,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.shell{max-width:1560px;margin:0 auto;padding:20px 20px 40px}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.brand-link{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.brand-logo{height:20px;width:auto}
.brand-divider{width:1px;height:14px;background:var(--border2)}
.brand-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);display:flex;align-items:center;gap:6px;white-space:nowrap}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .4s}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.header-nav{font-size:12px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.header-nav:hover{background:var(--bg4);color:var(--text)}
.header-nav.active{border-color:var(--orange);color:var(--orange)}
.search{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);width:200px;outline:none}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:var(--bg4);color:var(--text)}
.refresh-ring{width:14px;height:14px}
.refresh-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:2.5}
.ring-fill{fill:none;stroke:var(--orange);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:44;stroke-dashoffset:44}

/* ── KPI strip ── */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
@media(max-width:1100px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kpi-strip{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace}
.kpi-val{font-size:22px;font-weight:500;line-height:1.1}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}.c-green{color:var(--green)}
.c-red{color:var(--red)}.c-purple{color:var(--purple)}.c-teal{color:var(--teal)}.c-orange{color:var(--orange)}

/* ── Summary panels ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:860px){.two-col{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-head{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none}
.panel-head:hover{background:var(--bg3)}
.panel-title{font-size:11px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.panel-count{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);display:flex;align-items:center;gap:6px}
.chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.panel-body{padding:0;overflow:hidden;transition:max-height .25s ease}

/* ── Panel item rows ── */
.item-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.item-row:last-child{border-bottom:none}
.item-row:hover{background:var(--bg3)}
.item-name{flex:1;min-width:0}
.item-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.item-stock{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.item-uom{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}

/* ── Badges ── */
.badge{font-size:10px;padding:2px 7px;border-radius:999px;white-space:nowrap;font-family:'DM Mono',monospace;font-weight:500}
.b-reorder{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-overstock{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.b-watch{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-nodata{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.b-half{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.2)}

/* ── Filter row ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fbtn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.on{background:var(--orange);border-color:var(--orange);color:#fff}
.fbtn.on-red{background:var(--red);border-color:var(--red);color:#fff}
.fbtn.on-amber{background:var(--amber);border-color:var(--amber);color:#000}
.fbtn.on-green{background:var(--green);border-color:var(--green);color:#000}
.fbtn.on-teal{background:var(--teal);border-color:var(--teal);color:#000}
.sort-wrap{margin-left:auto}
.sort-select{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:999px;padding:5px 13px;font-size:12px;outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── Table wrapper — sticky header, horizontal scroll ── */
.tbl-outer{position:relative;border-radius:12px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
.tbl-wrap{overflow-y:auto;overflow-x:hidden;flex:1;min-height:0}
.full-table{width:100%;border-collapse:collapse;table-layout:fixed}
.full-table col.c-name   {width:28%}
.full-table col.c-code   {width:7%}
.full-table col.c-uom    {width:6%}
.full-table col.c-stock  {width:9%}
.full-table col.c-open   {width:9%}
.full-table col.c-issued {width:9%}
.full-table col.c-avg    {width:10%}
.full-table col.c-gap    {width:8%}
.full-table col.c-status {width:14%}
.full-table thead th{
  position:sticky;top:0;z-index:10;
  color:var(--text3);text-align:left;padding:8px 7px;
  font-weight:500;font-family:'DM Mono',monospace;font-size:9px;
  border-bottom:1px solid var(--border2);
  background:var(--bg3);
  text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;
  cursor:pointer;user-select:none;
}
.full-table thead th:hover{color:var(--text);background:var(--bg4)}
.full-table thead th.sort-asc::after{content:' ↑';color:var(--orange)}
.full-table thead th.sort-desc::after{content:' ↓';color:var(--orange)}
.full-table td{padding:7px 7px;border-bottom:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.full-table td.name-col{color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:sticky;left:0;background:var(--bg);z-index:5}
.full-table tr:hover td{background:var(--bg3)}
.full-table tr:hover td.name-col{background:var(--bg3)}
.full-table tr.expanded-row td{background:var(--bg3)}
.full-table tr.expanded-row td.name-col{background:var(--bg3);border-left:2px solid var(--orange)}
.tbl-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin:14px 0 6px}

/* ── Detail expand ── */
.item-detail{background:rgba(0,0,0,.35);padding:14px 16px;border-bottom:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:12px}
.detail-stat{background:var(--bg3);border-radius:8px;padding:8px 10px}
.detail-stat-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:3px}
.detail-stat-val{font-size:15px;font-weight:500;font-family:'DM Mono',monospace}
.mini-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.mini-table th{color:var(--text3);text-align:left;padding:3px 5px;font-weight:400;font-family:'DM Mono',monospace;font-size:10px;border-bottom:1px solid var(--border)}
.mini-table td{padding:4px 5px;border-bottom:1px solid var(--border);color:var(--text2)}
.mini-table td:first-child{color:var(--text)}
.mini-table tr:last-child td{border-bottom:none}
.section-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:5px;margin-top:10px}

/* ── Monthly avg panel ── */
.avg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:12px}
.avg-row{background:var(--bg3);border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.avg-name{font-size:12px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.avg-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace;flex-shrink:0}
.avg-uom{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}

/* ── Loader/Error ── */
.loader{padding:3rem;text-align:center;color:var(--text3)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{padding:2rem;text-align:center;background:var(--bg2);border:1px solid rgba(239,68,68,.2);border-radius:12px}
.err-title{color:var(--red);font-size:14px;font-weight:500;margin-bottom:6px}
.err-msg{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:6px}
.chart-wrap{padding:14px;position:relative}

@media(max-width:640px){
  .full-table col.c-name{width:35%}
  .full-table col.c-code{width:9%}
  .full-table col.c-uom{width:8%}
  .full-table col.c-stock{width:12%}
  .full-table col.c-open{width:0;display:none}
  .full-table col.c-issued{width:12%}
  .full-table col.c-avg{width:0;display:none}
  .full-table col.c-gap{width:10%}
  .full-table col.c-status{width:14%}
  .full-table td:nth-child(5),
  .full-table thead th:nth-child(5),
  .full-table td:nth-child(7),
  .full-table thead th:nth-child(7){display:none}
  .full-table td,.full-table thead th{padding:6px 4px;font-size:9px}
  .full-table td.name-col{font-size:10px}
  .tbl-wrap{max-height:60vh}
}
</style>
</head>

<script>
const API_URL    = 'https://script.google.com/macros/s/AKfycbz_suji7p0oLb7ds5IrljI0N13VAIe3UFbkxlq1zXdWFPprqYvLRNwC1kam45zKG7LA/exec';
const STORE_API  = API_URL + '?type=store';
const REFRESH_MS = 300000;

let storeData      = null;
let activeFilter   = 'all';
let expandedCode   = null;
let isFetching     = false;
let refreshTimer   = null;
let countdownTimer = null;
let isFirstLoad    = true;
let dailyChart     = null;
let sortCol        = 'stock_asc';
let sortDir        = 1;
// Panel open state — all open by default
const panelOpen = { top: true, reorder: true, avg: true, daily: true };

// ── Helpers ─────────────────────────────────────────────────
function fmt(n, d=1){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return parseFloat(n).toLocaleString('en-IN',{maximumFractionDigits:d,minimumFractionDigits:0});
}
function fmtDate(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
}
function stockColor(i){
  if(i.needsReorder)   return 'var(--red)';
  if(i.belowHalfAlert) return 'var(--purple)';
  if(i.isOverstocked)  return 'var(--amber)';
  if(i.isWatch)        return 'var(--blue)';
  if(!i.runningAvgMonthly&&!i.currentStock) return 'var(--text3)';
  return 'var(--green)';
}
function itemBadge(i){
  if(i.needsReorder)   return '<span class="badge b-reorder">⚠ Reorder</span>';
  if(i.belowHalfAlert) return '<span class="badge b-half">▼ Below 50%</span>';
  if(i.isOverstocked)  return '<span class="badge b-overstock">Overstocked</span>';
  if(i.isWatch)        return '<span class="badge b-watch">Watch</span>';
  if(!i.runningAvgMonthly&&!i.currentStock) return '<span class="badge b-nodata">No data</span>';
  return '<span class="badge b-ok">Adequate</span>';
}

// ── Data load ────────────────────────────────────────────────
async function loadData(silent=false){
  if(isFetching) return;
  isFetching = true;
  if(!silent && isFirstLoad)
    document.getElementById('main-area').innerHTML = '<div class="loader"><span class="spin"></span>Loading live store data…</div>';
  document.getElementById('brand-dot').style.background = 'var(--amber)';
  document.getElementById('sync-text').textContent = 'Syncing…';
  try {
    const res  = await fetch(STORE_API + '&t=' + Date.now());
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    storeData = data;
    const ts  = new Date(data.generatedAt);
    document.getElementById('brand-dot').style.background = 'var(--green)';
    document.getElementById('sync-text').textContent =
      `Synced ${ts.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})} · ${data.totalSKUs} SKUs`;
    document.getElementById('refresh-ring').style.display = 'flex';
    const scrollY = silent ? window.scrollY : 0;
    renderKPIs();
    renderSummaryPanels();
    applyFilters();
    if(silent && scrollY) window.scrollTo({top:scrollY,behavior:'instant'});
    isFirstLoad = false;
  } catch(e){
    document.getElementById('brand-dot').style.background = 'var(--red)';
    document.getElementById('sync-text').textContent = 'Failed to sync';
    if(isFirstLoad)
      document.getElementById('main-area').innerHTML =
        `<div class="err-box"><div class="err-title">Could not load store data</div>
         <div class="err-msg">${e.message}</div>
         <div class="err-msg" style="margin-top:6px">Deploy updated Code.gs and run testStoreRun() to verify.</div></div>`;
  } finally { isFetching = false; }
}

function manualRefresh(){ stopCountdown(); clearInterval(refreshTimer); loadData(false); scheduleRefresh(); }
function scheduleRefresh(){
  clearInterval(refreshTimer); startCountdown();
  refreshTimer = setInterval(()=>{ loadData(true); startCountdown(); }, REFRESH_MS);
}
function startCountdown(){
  stopCountdown();
  const ring = document.getElementById('ring-fill');
  if(!ring) return;
  let elapsed = 0;
  ring.style.strokeDashoffset = 44;
  countdownTimer = setInterval(()=>{ elapsed+=500; ring.style.strokeDashoffset = 44-(44*elapsed/REFRESH_MS); }, 500);
}
function stopCountdown(){
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  const ring = document.getElementById('ring-fill');
  if(ring) ring.style.strokeDashoffset = 44;
}

// ── KPI strip ────────────────────────────────────────────────
function renderKPIs(){
  if(!storeData) return;
  const d = storeData;
  const liveLabel = d.completeLiveMonths === 0
    ? 'Baseline only · Jun active'
    : d.completeLiveMonths + ' live mo + ' + d.baselineMonths + ' baseline';
  const todayLabel = d.todayTxns === 0
    ? 'No entries today yet'
    : fmt(d.todayIssued) + ' units out today';
  document.getElementById('kpi-strip').innerHTML = [
    {label:'Active SKUs',      val:d.activeSKUs,        cls:'c-blue',   sub:d.totalSKUs+' total tracked'},
    {label:'⚠ Reorder now',   val:d.needsReorderCount, cls:'c-red',    sub:'below safety stock'},
    {label:'▼ Below 50% avg', val:d.belowHalfCount,    cls:'c-purple', sub:'needs attention soon'},
    {label:'Overstocked',      val:d.overstockedCount,  cls:'c-amber',  sub:'skip / reduce buying'},
    {label:"Today's issues",   val:d.todayTxns,         cls:'c-teal',   sub:todayLabel},
    {label:'Avg based on',     val:liveLabel,           cls:'c-orange', sub:'updates each full month'},
  ].map(k=>`
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val ${k.cls}" style="${typeof k.val==='string'?'font-size:12px;line-height:1.4;':''}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

// ── Collapsible panel helper ─────────────────────────────────
function togglePanel(key){
  panelOpen[key] = !panelOpen[key];
  const body = document.getElementById('pb-'+key);
  const chev = document.getElementById('chev-'+key);
  if(body){
    body.style.display = panelOpen[key] ? '' : 'none';
  }
  if(chev) chev.textContent = panelOpen[key] ? '▾' : '▸';
}

// ── Summary panels ───────────────────────────────────────────
function renderSummaryPanels(){
  if(!storeData){ document.getElementById('summary-panels').innerHTML=''; return; }
  const d     = storeData;
  const items = d.items||[];

  // Top consumed
  const topItems = [...items].filter(i=>i.totalIssued>0).sort((a,b)=>b.totalIssued-a.totalIssued).slice(0,8);
  const topRows  = topItems.map(i=>`
    <div class="item-row" onclick="focusItem('${i.code}')">
      <div class="item-name">
        <div class="item-title">${i.name||i.code}</div>
        <div class="item-meta">${i.code}${i.spec?' · '+i.spec:''}</div>
      </div>
      <div class="item-right">
        <div class="item-stock" style="color:var(--orange)">${fmt(i.totalIssued)} <span class="item-uom">${i.uom}</span></div>
        <div class="item-uom">${fmt(i.avgWeeklyOut,1)}/wk avg</div>
      </div>
    </div>`).join('')||'<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">No consumption data yet</div>';

  // Reorder items
  const critItems = [...items].filter(i=>i.needsReorder).sort((a,b)=>a.stockGap-b.stockGap).slice(0,8);
  const critRows  = critItems.length
    ? critItems.map(i=>`
      <div class="item-row" onclick="focusItem('${i.code}')">
        <div class="item-name">
          <div class="item-title">${i.name||i.code}</div>
          <div class="item-meta">${i.code}</div>
        </div>
        <div class="item-right">
          <div class="item-stock" style="color:var(--red)">${fmt(i.currentStock)} <span class="item-uom">${i.uom}</span></div>
          <div class="item-uom">need ${fmt(i.safetyStock,1)}</div>
        </div>
      </div>`).join('')
    : '<div style="padding:16px;text-align:center;color:var(--green);font-size:12px;font-family:DM Mono,monospace">✓ All items above safety stock</div>';

  // Monthly avg report — top 20 by running avg
  const avgItems = [...items].filter(i=>i.runningAvgMonthly>0).sort((a,b)=>b.runningAvgMonthly-a.runningAvgMonthly).slice(0,40);
  const avgRows  = avgItems.map(i=>{
    const pctChange = i.baselineAvgMonthly > 0
      ? Math.round(((i.runningAvgMonthly - i.baselineAvgMonthly)/i.baselineAvgMonthly)*100) : 0;
    const chgColor = pctChange>5?'var(--red)':pctChange<-5?'var(--green)':'var(--text3)';
    const chgLabel = pctChange===0?'':'<span style="font-size:10px;color:'+chgColor+'"> ('+( pctChange>0?'+':'')+pctChange+'%)</span>';
    return `
    <div class="avg-row">
      <div>
        <div class="avg-name" title="${i.name}">${i.name||i.code}</div>
        <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${i.code}</div>
      </div>
      <div style="text-align:right">
        <div class="avg-val" style="color:var(--orange)">${fmt(i.runningAvgMonthly)} <span class="avg-uom">${i.uom}</span>${chgLabel}</div>
        <div class="avg-uom">baseline: ${fmt(i.baselineAvgMonthly)}</div>
      </div>
    </div>`;
  }).join('');

  // Daily chart data
  const dailyEntries = Object.entries(d.dailyOut||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const hasDailyData = dailyEntries.length > 0;

  document.getElementById('summary-panels').innerHTML = `
  <div style="margin-bottom:10px">
    <!-- Row 1: top consumed + reorder -->
    <div class="two-col" style="margin-bottom:10px">
      <div class="panel">
        <div class="panel-head" onclick="togglePanel('top')">
          <span class="panel-title">Top consumed · June 1+</span>
          <span class="panel-count"><span>${topItems.length} items</span><span class="chevron ${panelOpen.top?'open':''}" id="chev-top">▾</span></span>
        </div>
        <div class="panel-body" id="pb-top" style="display:${panelOpen.top?'':'none'}">${topRows}</div>
      </div>
      <div class="panel">
        <div class="panel-head" onclick="togglePanel('reorder')" style="border-color:rgba(239,68,68,.15)">
          <span class="panel-title" style="color:var(--red)">⚠ Reorder now</span>
          <span class="panel-count"><span>${d.needsReorderCount} items</span><span class="chevron ${panelOpen.reorder?'open':''}" id="chev-reorder">▾</span></span>
        </div>
        <div class="panel-body" id="pb-reorder" style="display:${panelOpen.reorder?'':'none'}">${critRows}</div>
      </div>
    </div>

    <!-- Row 2: monthly avg report + daily chart -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-head" onclick="togglePanel('avg')">
          <span class="panel-title">Monthly avg required qty</span>
          <span class="panel-count"><span>running avg · blended</span><span class="chevron ${panelOpen.avg?'open':''}" id="chev-avg">▾</span></span>
        </div>
        <div class="panel-body" id="pb-avg" style="display:${panelOpen.avg?'':'none'};max-height:340px;overflow-y:auto">
          <div class="avg-grid">${avgRows}</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head" onclick="togglePanel('daily')">
          <span class="panel-title">Daily consumption · ${new Date().toLocaleString('en-IN',{month:'long',year:'numeric'})}</span>
          <span class="panel-count"><span>${dailyEntries.length} days</span><span class="chevron ${panelOpen.daily?'open':''}" id="chev-daily">▾</span></span>
        </div>
        <div class="panel-body" id="pb-daily" style="display:${panelOpen.daily?'':'none'}">
          ${hasDailyData
            ? '<div class="chart-wrap" style="height:310px;position:relative"><canvas id="daily-chart"></canvas></div>'
            : '<div style="padding:40px;text-align:center;color:var(--text3);font-family:DM Mono,monospace;font-size:12px">No consumption recorded today yet</div>'
          }
        </div>
      </div>
    </div>
  </div>`;

  if(hasDailyData && panelOpen.daily) renderDailyChart();
}

function renderDailyChart(){
  const canvas = document.getElementById('daily-chart');
  if(!canvas || !storeData.dailyOut) return;
  if(dailyChart){ dailyChart.destroy(); dailyChart=null; }
  const entries = Object.entries(storeData.dailyOut).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!entries.length) return;
  dailyChart = new Chart(canvas,{
    type:'bar',
    data:{
      labels: entries.map(([d])=>new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})),
      datasets:[{
        label:'Units issued',data:entries.map(([,v])=>Math.round(v)),
        backgroundColor:'rgba(240,84,35,0.75)',borderRadius:3,borderSkipped:false
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#555',font:{size:10},maxRotation:45,autoSkip:true},grid:{display:false}},
        y:{ticks:{color:'#555',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
}

// ── Filters & sort ───────────────────────────────────────────
function setFilter(f,btn,cls){
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-red','on-amber','on-green','on-teal'));
  btn.classList.add(cls);
  applyFilters();
}

function applyFilters(){
  setTimeout(fitTableHeight, 30);
  if(!storeData) return;
  const q    = (document.getElementById('search-box').value||'').toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let items  = storeData.items||[];

  if(activeFilter==='reorder')    items=items.filter(i=>i.needsReorder);
  else if(activeFilter==='half')  items=items.filter(i=>i.belowHalfAlert&&!i.needsReorder);
  else if(activeFilter==='overstock') items=items.filter(i=>i.isOverstocked);
  else if(activeFilter==='watch') items=items.filter(i=>i.isWatch&&!i.isOverstocked&&!i.needsReorder);
  else if(activeFilter==='ok')    items=items.filter(i=>!i.needsReorder&&!i.belowHalfAlert&&!i.isOverstocked&&!i.isWatch&&i.runningAvgMonthly>0);
  else if(activeFilter==='nodata')items=items.filter(i=>!i.runningAvgMonthly&&!i.totalReceived&&!i.openingStock);

  if(q) items=items.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.code||'').toLowerCase().includes(q)||(i.spec||'').toLowerCase().includes(q));

  if(sort==='stock_asc')     items=[...items].sort((a,b)=>a.currentStock-b.currentStock);
  else if(sort==='stock_desc')    items=[...items].sort((a,b)=>b.currentStock-a.currentStock);
  else if(sort==='consumption')   items=[...items].sort((a,b)=>b.totalIssued-a.totalIssued);
  else if(sort==='reorder')       items=[...items].sort((a,b)=>a.stockGap-b.stockGap);
  else if(sort==='name')          items=[...items].sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  renderTable(items);
}

// ── Table ────────────────────────────────────────────────────
function renderTable(items){
  const el = document.getElementById('main-area');
  if(!items.length){ el.innerHTML='<div class="loader" style="color:var(--text3)">No items match.</div>'; return; }

  const rows = items.map(i=>{
    const isExp = expandedCode===i.code;
    const sc    = stockColor(i);
    const detailHtml = isExp ? renderDetail(i) : '';
    return `
      <tr class="${isExp?'expanded-row':''}" onclick="toggleExpand('${i.code}')" style="cursor:pointer">
        <td class="name-col">${i.name||i.code}</td>
        <td style="color:var(--text3)">${i.code}</td>
        <td style="color:var(--text3)">${i.uom||'—'}</td>
        <td style="color:${sc};font-weight:600">${fmt(i.currentStock)}</td>
        <td style="color:var(--text2)">${fmt(i.openingStock)}</td>
        <td style="color:var(--orange)">${fmt(i.totalIssued)}</td>
        <td style="color:var(--purple)">${fmt(i.runningAvgMonthly)}</td>
        <td style="color:${i.stockGap<0?'var(--red)':'var(--green)'};font-weight:500">${fmt(i.stockGap)}</td>
        <td>${itemBadge(i)}</td>
      </tr>
      ${isExp?`<tr><td colspan="9" style="padding:0" id="detail-${i.code}">${detailHtml}</td></tr>`:''}`;
  }).join('');

  el.innerHTML = `
  <div class="tbl-label">Full item list — ${items.length} SKUs</div>
  <div class="tbl-outer">
    <div class="tbl-wrap">
      <table class="full-table">
        <colgroup>
          <col class="c-name"><col class="c-code"><col class="c-uom">
          <col class="c-stock"><col class="c-open"><col class="c-issued">
          <col class="c-avg"><col class="c-gap"><col class="c-status">
        </colgroup>
        <thead>
          <tr>
            <th>Material</th>
            <th>Code</th>
            <th>UOM</th>
            <th>Stock</th>
            <th>Opening</th>
            <th>Issued</th>
            <th>Avg/mo</th>
            <th>Gap</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Focus item (from panel click) ────────────────────────────
function focusItem(code){
  // Switch to all-items view, scroll to item
  activeFilter = 'all';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-red','on-amber','on-green','on-teal'));
  document.getElementById('fbtn-all').classList.add('on');
  expandedCode = code;
  applyFilters();
  setTimeout(()=>{
    const el = document.getElementById('detail-'+code);
    if(el) el.closest('tr').previousElementSibling?.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
  if(!detailCache[code]) fetchDetail(code);
}

// ── Detail expand ────────────────────────────────────────────
const detailCache = {};

async function toggleExpand(code){
  if(expandedCode===code){ expandedCode=null; applyFilters(); return; }
  expandedCode = code;
  applyFilters();
  if(!detailCache[code]) fetchDetail(code);
}

async function fetchDetail(code){
  const detailEl = document.getElementById('detail-'+code);
  if(detailEl) detailEl.innerHTML='<div style="padding:12px 16px;color:var(--text3);font-family:DM Mono,monospace;font-size:11px"><span class="spin"></span> Loading detail…</div>';
  try {
    const res  = await fetch(API_URL+'?type=store&detail='+encodeURIComponent(code)+'&t='+Date.now());
    const data = await res.json();
    detailCache[code] = data;
    if(expandedCode===code) applyFilters();
  } catch(e){
    if(detailEl) detailEl.innerHTML='<div style="padding:12px;color:var(--red);font-family:DM Mono,monospace;font-size:11px">Failed to load detail</div>';
  }
}

function renderDetail(item){
  const cached   = detailCache[item.code];
  const received = cached ? cached.received : (item.recentReceived||[]);
  const issued   = cached ? cached.issued   : (item.recentIssued||[]);

  const recRows = received.length
    ? received.slice(0,10).map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${fmt(r.qty)} ${r.uom||item.uom}</td><td style="color:var(--text3)">${r.remarks||'RECEIVED'}</td></tr>`).join('')
    : '<tr><td colspan="3" style="color:var(--text3)">No receipts since Jun 1</td></tr>';
  const issRows = issued.length
    ? issued.slice(0,10).map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${fmt(r.qty)}</td><td>${r.dept||'—'}</td><td style="max-width:110px;overflow:hidden;text-overflow:ellipsis">${r.project||'—'}</td></tr>`).join('')
    : '<tr><td colspan="4" style="color:var(--text3)">No issues since Jun 1</td></tr>';

  const halfThr  = item.runningAvgMonthly*0.5;
  const alertHtml = item.belowHalfAlert
    ? `<div style="background:var(--purple-dim);border:1px solid rgba(168,85,247,.2);border-radius:6px;padding:7px 10px;font-size:11px;color:var(--purple);font-family:'DM Mono',monospace;margin-bottom:10px">
        ▼ Stock (${fmt(item.currentStock)} ${item.uom}) below 50% of monthly avg (${fmt(halfThr)} ${item.uom}) — replenish soon
       </div>` : '';

  return `
  <div class="item-detail">
    ${alertHtml}
    <div class="detail-grid">
      <div class="detail-stat">
        <div class="detail-stat-lbl">Baseline avg/mo</div>
        <div class="detail-stat-val" style="color:var(--text2)">${fmt(item.baselineAvgMonthly)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
        <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">Jan–May 2026</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Running avg/mo</div>
        <div class="detail-stat-val" style="color:var(--orange)">${fmt(item.runningAvgMonthly)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
        <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">blended · updates monthly</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Opening (Jun 1)</div>
        <div class="detail-stat-val" style="color:var(--blue)">${fmt(item.openingStock)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Received (Jun+)</div>
        <div class="detail-stat-val" style="color:var(--teal)">${fmt(item.totalReceived)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Issued (Jun+)</div>
        <div class="detail-stat-val" style="color:var(--orange)">${fmt(item.totalIssued)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Current stock</div>
        <div class="detail-stat-val" style="color:${stockColor(item)}">${fmt(item.currentStock)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Safety stock</div>
        <div class="detail-stat-val">${fmt(item.safetyStock)} <span style="font-size:10px;color:var(--text3)">${item.uom}</span></div>
        <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">3-wk lead + 25% surge</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Months remaining</div>
        <div class="detail-stat-val" style="color:${item.monthsRemaining<1?'var(--red)':item.monthsRemaining>3?'var(--amber)':'var(--green)'}">${item.monthsRemaining>=99?'∞':fmt(item.monthsRemaining,1)}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div>
        <div class="section-lbl">Recent receipts (Jun+)</div>
        <table class="mini-table">
          <thead><tr><th>Date</th><th>Qty</th><th>Type</th></tr></thead>
          <tbody>${recRows}</tbody>
        </table>
      </div>
      <div>
        <div class="section-lbl">Recent issues (Jun+)</div>
        <table class="mini-table">
          <thead><tr><th>Date</th><th>Qty</th><th>Dept</th><th>Project</th></tr></thead>
          <tbody>${issRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}


// ── Dynamic table height ──────────────────────────────────
function fitTableHeight() {
  const wrap = document.querySelector('.tbl-wrap');
  if (!wrap) return;
  const rect = wrap.getBoundingClientRect();
  const windowH = window.innerHeight;
  const newH = windowH - rect.top - 16; // 16px bottom padding
  wrap.style.height = Math.max(200, newH) + 'px';
}
window.addEventListener('resize', fitTableHeight);
// Call after render
const _origApplyFilters = applyFilters;

// ── Boot ─────────────────────────────────────────────────────
loadData(false);
scheduleRefresh();
</script>

</html>
