<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Intelligence · Artenspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.13);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.13);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.13);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.13);
  --orange:#f05423;
  --teal:#14b8a6;--teal-dim:rgba(20,184,166,0.13);
  --drawer-w:420px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column}

/* ── Layout: header + body fills remaining height ── */
.page-header{flex-shrink:0;padding:10px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:var(--bg)}
.page-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 20px 0}

/* ── Brand ── */
.brand-link{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-logo{height:20px;width:auto}
.brand-divider{width:1px;height:14px;background:var(--border2)}
.brand-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);display:flex;align-items:center;gap:6px;white-space:nowrap}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .4s}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.header-nav{font-size:12px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.header-nav:hover{background:var(--bg4);color:var(--text)}
.header-nav.active{border-color:var(--orange);color:var(--orange)}
.search{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);width:200px;outline:none}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-panel{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-panel:hover{background:var(--bg4);color:var(--text)}
.btn-panel.active{border-color:var(--orange);color:var(--orange)}
.refresh-ring{width:14px;height:14px}
.refresh-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:2.5}
.ring-fill{fill:none;stroke:var(--orange);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:44;stroke-dashoffset:44}

/* ── Colour utilities ── */
.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}.c-green{color:var(--green)}
.c-red{color:var(--red)}.c-purple{color:var(--purple)}.c-teal{color:var(--teal)}.c-orange{color:var(--orange)}

/* ── Minimal status bar ── */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px;flex-shrink:0;gap:8px}

/* ── Filter buttons (used inside drawer only) ── */
.fbtn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.on{background:var(--orange);border-color:var(--orange);color:#fff}
.fbtn.on-red{background:var(--red);border-color:var(--red);color:#fff}
.fbtn.on-amber{background:var(--amber);border-color:var(--amber);color:#000}
.fbtn.on-green{background:var(--green);border-color:var(--green);color:#000}
.fbtn.on-teal{background:var(--teal);border-color:var(--teal);color:#000}
.sort-select{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12px;outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── Table — fills ALL remaining height ── */
.tbl-outer{flex:1;border-radius:10px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tbl-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:6px;flex-shrink:0}
.tbl-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.full-table{width:100%;border-collapse:collapse;table-layout:fixed}
.full-table col.c-name {width:20%}
.full-table col.c-uom  {width:5%}
.full-table col.c-stock{width:8%}
.full-table col.c-open {width:8%}
.full-table col.c-recv {width:7%}
.full-table col.c-issue{width:7%}
.full-table col.c-base {width:10%}
.full-table col.c-run  {width:10%}
.full-table col.c-rpt  {width:8%}
.full-table col.c-gap  {width:7%}
.full-table col.c-badge{width:10%}
.full-table thead th{
  position:sticky;top:0;z-index:10;
  color:var(--text3);text-align:left;padding:8px 8px;
  font-weight:500;font-family:'DM Mono',monospace;font-size:9.5px;
  border-bottom:1px solid var(--border2);background:var(--bg3);
  text-transform:uppercase;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.full-table td{
  padding:8px 8px;border-bottom:1px solid var(--border);
  color:var(--text2);font-family:'DM Mono',monospace;font-size:10.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.full-table td.name-col{color:var(--text);font-family:'DM Sans',sans-serif;font-size:11px}
.full-table tr:hover td{background:var(--bg3);cursor:pointer}
.full-table tr.exp-row td{background:var(--bg3)}
.full-table tr.exp-row td.name-col{border-left:2px solid var(--orange)}
.full-table tr.detail-tr td{padding:0}

/* ── Pagination bar ── */
.pager{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--border);background:var(--bg2)}
.pager-info{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.pager-btns{display:flex;gap:4px;align-items:center}
.pager-btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.pager-btn:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.pager-btn:disabled{opacity:0.3;cursor:default}
.pager-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
.pager-page-nums{display:flex;gap:3px}

/* ── Right drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;bottom:0;width:var(--drawer-w);background:var(--bg2);border-left:1px solid var(--border2);z-index:101;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.drawer-close{background:none;border:1px solid var(--border);color:var(--text3);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.drawer-close:hover{background:var(--bg3);color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:0}

/* ── Drawer panels ── */
.d-section{border-bottom:1px solid var(--border)}
.d-sec-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.d-sec-head:hover{background:var(--bg3)}
.d-sec-title{font-size:11px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.d-sec-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px}
.d-sec-body{overflow:hidden}
.d-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.d-item:last-child{border-bottom:none}
.d-item:hover{background:var(--bg3)}
.d-item-name{flex:1;min-width:0}
.d-item-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-item-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.d-item-right{flex-shrink:0;text-align:right}
.d-item-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.d-item-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}

/* ── Search popup ── */
.search-popup{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:200;display:none;min-width:260px}
.search-popup.open{display:block}
.search-popup input{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none}
.search-popup input:focus{border-color:var(--blue)}
.search-popup input::placeholder{color:var(--text3)}
.search-anchor{position:relative}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:15px}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
.icon-btn.active{border-color:var(--blue);color:var(--blue)}
.avg-row-d{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border)}
.avg-row-d:last-child{border-bottom:none}
.avg-name-d{font-size:11px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.avg-code-d{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace}
.avg-val-d{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--orange);flex-shrink:0}
.avg-uom-d{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace}

/* ── Detail expand in table ── */
.item-detail{background:rgba(0,0,0,.35);padding:12px 16px}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.detail-stat{background:var(--bg3);border-radius:7px;padding:7px 9px}
.detail-stat-lbl{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px}
.detail-stat-val{font-size:14px;font-weight:500;font-family:'DM Mono',monospace}
.mini-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:5px}
.mini-table th{color:var(--text3);text-align:left;padding:3px 5px;font-weight:400;font-family:'DM Mono',monospace;font-size:10px;border-bottom:1px solid var(--border)}
.mini-table td{padding:4px 5px;border-bottom:1px solid var(--border);color:var(--text2)}
.mini-table td:first-child{color:var(--text)}
.mini-table tr:last-child td{border-bottom:none}
.section-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin:8px 0 4px}

/* ── Badges ── */
.badge{font-size:9.5px;padding:2px 6px;border-radius:999px;white-space:nowrap;font-family:'DM Mono',monospace;font-weight:500}
.b-reorder{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-overstock{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.b-watch{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-nodata{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.b-half{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.2)}

/* ── Loader/Error ── */
.loader{padding:3rem;text-align:center;color:var(--text3)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{padding:2rem;text-align:center;background:var(--bg2);border:1px solid rgba(239,68,68,.2);border-radius:10px}
.chart-wrap{padding:12px;position:relative}
</style>
</head>
<body>

<!-- Page header: left nav | center logo | right actions -->
<div class="page-header">
  <!-- Left: nav links + sync status -->
  <div style="display:flex;align-items:center;gap:8px">
    <a class="header-nav" href="index.html">↗ Production</a>
    <a class="header-nav active" href="store.html">Store Intelligence</a>
    <div class="brand-sub" style="margin-left:4px">
      <span class="conn-dot" id="brand-dot"></span>
      <span id="sync-text">Not connected</span>
      <div class="refresh-ring" id="refresh-ring" style="display:none">
        <svg width="14" height="14" viewBox="0 0 18 18">
          <circle class="ring-bg" cx="9" cy="9" r="7"/>
          <circle class="ring-fill" id="ring-fill" cx="9" cy="9" r="7"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Center: Artenspace logo -->
  <a href="index.html" style="display:flex;justify-content:center;text-decoration:none">
    <svg style="height:22px;width:auto" viewBox="0 0 2260.8 629.4" xmlns="http://www.w3.org/2000/svg">
      <style>.st0{fill:#F05423;}</style>
      <g><g>

      </g></g>
    </svg>
  </a>

  <!-- Right: search icon + panels + refresh -->
  <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
    <!-- Search icon with popup -->
    <div class="search-anchor" id="search-anchor">
      <button class="icon-btn" id="search-icon-btn" onclick="toggleSearch()" title="Search material / code">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <div class="search-popup" id="search-popup">
        <input type="text" id="search-box" placeholder="Search material / code…" oninput="applyFilters()" autocomplete="off">
      </div>
    </div>
    <button class="btn-panel" id="drawer-toggle-btn" onclick="toggleDrawer()">☰ Summary panels</button>
    <button class="btn" onclick="manualRefresh()">&#8635; Refresh</button>
  </div>
</div>

<!-- Page body: table is the full hero — no KPIs, no filters here -->
<div class="page-body">
  <!-- Minimal status bar: just item count + active filter indicator -->
  <div class="status-bar" id="status-bar">
    <span id="status-count" style="color:var(--text3);font-family:'DM Mono',monospace;font-size:11px">Loading…</span>
    <span id="status-filter" style="font-family:'DM Mono',monospace;font-size:11px"></span>
  </div>

  <div class="tbl-outer">
    <div class="tbl-scroll" id="tbl-scroll">
      <table class="full-table" id="full-table">
        <colgroup>
          <col class="c-name"><col class="c-uom"><col class="c-stock">
          <col class="c-open"><col class="c-recv"><col class="c-issue">
          <col class="c-base"><col class="c-run"><col class="c-rpt">
          <col class="c-gap"><col class="c-badge">
        </colgroup>
        <thead>
          <tr>
            <th>Material · Code</th><th>UOM</th><th>Current stock</th>
            <th>Opening Jun 1</th><th>Received</th><th>Issued</th>
            <th>Baseline/mo</th><th>Running/mo</th><th>Reorder pt</th>
            <th>Gap</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="tbl-body"><tr><td colspan="11" class="loader"><span class="spin"></span>Loading store data…</td></tr></tbody>
      </table>
    </div>
    <div class="pager" id="pager" style="display:none">
      <div class="pager-info" id="pager-info"></div>
      <div class="pager-btns">
        <button class="pager-btn" id="pg-prev" onclick="goPage(currentPage-1)">‹ Prev</button>
        <div class="pager-page-nums" id="pg-nums"></div>
        <button class="pager-btn" id="pg-next" onclick="goPage(currentPage+1)">Next ›</button>
      </div>
    </div>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- Right drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Summary panels</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="loader"><span class="spin"></span>Loading…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API_URL    = 'https://script.google.com/macros/s/AKfycbz_suji7p0oLb7ds5IrljI0N13VAIe3UFbkxlq1zXdWFPprqYvLRNwC1kam45zKG7LA/exec';
const STORE_API  = API_URL + '?type=store';
const REFRESH_MS = 300000;
const PAGE_SIZE  = 50;

let storeData      = null;
let filteredItems  = [];
let currentPage    = 1;
let activeFilter   = 'all';
let expandedCode   = null;
let isFetching     = false;
let refreshTimer   = null;
let countdownTimer = null;
let isFirstLoad    = true;
let dailyChart     = null;
const drawerOpen   = {v:false};
const secOpen      = {kpis:false, filters:false, top:false, reorder:false, avg:false, daily:false};
const detailCache  = {};

// ── Helpers ──────────────────────────────────────────────────
function fmt(n,d=1){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return parseFloat(n).toLocaleString('en-IN',{maximumFractionDigits:d,minimumFractionDigits:0});
}
function fmtDate(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
}
function stockColor(i){
  if(i.needsReorder)   return 'var(--red)';
  if(i.belowHalfAlert) return 'var(--purple)';
  if(i.isOverstocked)  return 'var(--amber)';
  if(i.isWatch)        return 'var(--blue)';
  if(!i.runningAvgMonthly&&!i.currentStock) return 'var(--text3)';
  return 'var(--green)';
}
function itemBadge(i){
  if(i.needsReorder)   return '<span class="badge b-reorder">⚠ Reorder</span>';
  if(i.belowHalfAlert) return '<span class="badge b-half">▼ Below 50%</span>';
  if(i.isOverstocked)  return '<span class="badge b-overstock">Overstocked</span>';
  if(i.isWatch)        return '<span class="badge b-watch">Watch</span>';
  if(!i.runningAvgMonthly&&!i.currentStock) return '<span class="badge b-nodata">No data</span>';
  return '<span class="badge b-ok">Adequate</span>';
}

// ── Search icon popup ────────────────────────────────────────
let searchOpen = false;
function toggleSearch(){
  searchOpen = !searchOpen;
  const popup = document.getElementById('search-popup');
  const btn   = document.getElementById('search-icon-btn');
  popup.classList.toggle('open', searchOpen);
  btn.classList.toggle('active', searchOpen);
  if(searchOpen) setTimeout(()=>document.getElementById('search-box').focus(), 50);
}
document.addEventListener('click', e=>{
  const anchor = document.getElementById('search-anchor');
  if(anchor && !anchor.contains(e.target) && searchOpen){
    searchOpen = false;
    document.getElementById('search-popup').classList.remove('open');
    document.getElementById('search-icon-btn').classList.remove('active');
  }
});

// ── Load ─────────────────────────────────────────────────────
async function loadData(silent=false){
  if(isFetching) return;
  isFetching = true;
  document.getElementById('brand-dot').style.background = 'var(--amber)';
  document.getElementById('sync-text').textContent = 'Syncing…';
  try {
    const res  = await fetch(STORE_API + '&t=' + Date.now());
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    storeData = data;
    const ts  = new Date(data.generatedAt);
    document.getElementById('brand-dot').style.background = 'var(--green)';
    document.getElementById('sync-text').textContent =
      `Synced ${ts.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})} · ${data.totalSKUs} SKUs`;
    document.getElementById('refresh-ring').style.display = 'flex';
    renderKPIs();
    applyFilters();
    renderDrawer();
    isFirstLoad = false;
  } catch(e){
    document.getElementById('brand-dot').style.background = 'var(--red)';
    document.getElementById('sync-text').textContent = 'Failed to sync';
    document.getElementById('tbl-body').innerHTML =
      `<tr><td colspan="11"><div class="err-box" style="margin:12px"><div style="color:var(--red);font-weight:500">Could not load store data</div><div style="font-size:11px;color:var(--text3);font-family:DM Mono,monospace;margin-top:6px">${e.message}</div></div></td></tr>`;
  } finally { isFetching = false; }
}

function manualRefresh(){ stopCountdown(); clearInterval(refreshTimer); loadData(false); scheduleRefresh(); }
function scheduleRefresh(){
  clearInterval(refreshTimer); startCountdown();
  refreshTimer = setInterval(()=>{ loadData(true); startCountdown(); }, REFRESH_MS);
}
function startCountdown(){
  stopCountdown();
  const ring = document.getElementById('ring-fill'); if(!ring) return;
  let elapsed = 0; ring.style.strokeDashoffset = 44;
  countdownTimer = setInterval(()=>{ elapsed+=500; ring.style.strokeDashoffset = 44-(44*elapsed/REFRESH_MS); },500);
}
function stopCountdown(){
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  const ring = document.getElementById('ring-fill');
  if(ring) ring.style.strokeDashoffset = 44;
}

// ── KPIs — stored for drawer use, also updates status bar ────
function renderKPIs(){
  if(!storeData) return;
  const d = storeData;
  liveLabel = d.completeLiveMonths===0 ? 'Baseline · Jun active' : d.completeLiveMonths+' live + '+d.baselineMonths+' base';
  const sc = document.getElementById('status-count');
  if(sc) sc.textContent = `${d.totalSKUs} SKUs · ${d.activeSKUs} active`;
  updateStatusFilter();
}

function updateStatusFilter(){
  const sf = document.getElementById('status-filter');
  if(!sf || !storeData) return;
  const d = storeData;
  const filterLabels = {
    all:'All items', reorder:`⚠ ${d.needsReorderCount} need reorder`,
    half:`▼ ${d.belowHalfCount} below 50%`, overstock:`${d.overstockedCount} overstocked`,
    watch:'Watch list', ok:'Adequate', nodata:'No activity'
  };
  const label = filterLabels[activeFilter] || 'All items';
  sf.innerHTML = activeFilter === 'all'
    ? ''
    : `<span style="background:var(--bg3);border:1px solid var(--border2);border-radius:999px;padding:2px 10px;color:var(--orange)">${label}</span>`;
}

// ── Drawer ───────────────────────────────────────────────────
function toggleDrawer(){
  drawerOpen.v ? closeDrawer() : openDrawer();
}
function openDrawer(){
  drawerOpen.v = true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-toggle-btn').classList.add('active');
  renderDrawer();
}
function closeDrawer(){
  drawerOpen.v = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer-toggle-btn').classList.remove('active');
}
function toggleSection(key){
  secOpen[key] = !secOpen[key];
  const body = document.getElementById('ds-'+key);
  const chev = document.getElementById('dc-'+key);
  if(body) body.style.display = secOpen[key] ? '' : 'none';
  if(chev) chev.textContent   = secOpen[key] ? '▾' : '▸';
}

function renderDrawer(){
  if(!storeData) return;
  const d     = storeData;
  const items = d.items||[];

  // Top 10 consumed
  const topItems = [...items].filter(i=>i.totalIssued>0).sort((a,b)=>b.totalIssued-a.totalIssued).slice(0,10);
  const topRows  = topItems.map(i=>`
    <div class="d-item" onclick="focusItem('${i.code}');closeDrawer()">
      <div class="d-item-name">
        <div class="d-item-title">${i.name||i.code}</div>
        <div class="d-item-meta">${i.code}</div>
      </div>
      <div class="d-item-right">
        <div class="d-item-val" style="color:var(--orange)">${fmt(i.totalIssued)} <span style="font-size:9.5px;color:var(--text3)">${i.uom}</span></div>
        <div class="d-item-sub">${fmt(i.avgWeeklyOut,1)}/wk</div>
      </div>
    </div>`).join('')||'<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px">No data yet</div>';

  // Top 10 reorder (worst gap first)
  const critItems = [...items].filter(i=>i.needsReorder).sort((a,b)=>a.stockGap-b.stockGap).slice(0,10);
  const critRows  = critItems.length
    ? critItems.map(i=>`
      <div class="d-item" onclick="focusItem('${i.code}');closeDrawer()">
        <div class="d-item-name">
          <div class="d-item-title">${i.name||i.code}</div>
          <div class="d-item-meta">${i.code}</div>
        </div>
        <div class="d-item-right">
          <div class="d-item-val" style="color:var(--red)">${fmt(i.currentStock)}</div>
          <div class="d-item-sub">need ${fmt(i.safetyStock,0)}</div>
        </div>
      </div>`).join('')
    : '<div style="padding:14px;text-align:center;color:var(--green);font-size:12px;font-family:DM Mono,monospace">✓ All above safety stock</div>';

  // Monthly avg — top 30 by running avg
  const avgItems = [...items].filter(i=>i.runningAvgMonthly>0).sort((a,b)=>b.runningAvgMonthly-a.runningAvgMonthly).slice(0,30);
  const avgRows  = avgItems.map(i=>{
    const pct = i.baselineAvgMonthly>0 ? Math.round(((i.runningAvgMonthly-i.baselineAvgMonthly)/i.baselineAvgMonthly)*100) : 0;
    const pctHtml = pct!==0 ? ` <span style="font-size:9px;color:${pct>5?'var(--red)':pct<-5?'var(--green)':'var(--text3)'}">(${pct>0?'+':''}${pct}%)</span>` : '';
    return `
    <div class="avg-row-d">
      <div style="min-width:0">
        <div class="avg-name-d" title="${i.name}">${i.name||i.code}</div>
        <div class="avg-code-d">${i.code}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="avg-val-d">${fmt(i.runningAvgMonthly)} <span class="avg-uom-d">${i.uom}</span>${pctHtml}</div>
        <div class="avg-uom-d">base: ${fmt(i.baselineAvgMonthly)}</div>
      </div>
    </div>`;
  }).join('');

  // Daily chart
  const dailyEntries = Object.entries(d.dailyOut||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const chartHtml = dailyEntries.length
    ? `<div class="chart-wrap" style="height:180px"><canvas id="daily-chart"></canvas></div>`
    : '<div style="padding:24px;text-align:center;color:var(--text3);font-family:DM Mono,monospace;font-size:11px">No consumption recorded this month yet</div>';

  document.getElementById('drawer-body').innerHTML = `
    <!-- KPI section -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('kpis')">
        <span class="d-sec-title">Store health · KPIs</span>
        <span class="d-sec-meta"><span>6 metrics</span><span id="dc-kpis">${secOpen.kpis?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" id="ds-kpis" style="display:${secOpen.kpis?'':'none'}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px">
          ${[
            {label:'Active SKUs',    val:d.activeSKUs,        cls:'c-blue',  sub:d.totalSKUs+' tracked'},
            {label:'⚠ Reorder now', val:d.needsReorderCount, cls:'c-red',   sub:'below safety stock'},
            {label:'▼ Below 50%',   val:d.belowHalfCount,    cls:'c-purple',sub:'attention soon'},
            {label:'Overstocked',    val:d.overstockedCount,  cls:'c-amber', sub:'skip buying'},
            {label:"Today's issues", val:d.todayTxns===0?'—':d.todayTxns, cls:'c-teal', sub:d.todayTxns===0?'No entries yet':fmt(d.todayIssued)+' units'},
            {label:'Avg based on',   val:liveLabel,           cls:'c-orange',sub:'updates monthly'},
          ].map(k=>`
            <div style="background:var(--bg3);border-radius:8px;padding:9px 10px">
              <div style="font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${k.label}</div>
              <div class="${k.cls}" style="font-size:${typeof k.val==='string'&&k.val.length>6?'11px':'18px'};font-weight:500;line-height:1.2">${k.val}</div>
              <div style="font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${k.sub}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Filter + sort section -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('filters')">
        <span class="d-sec-title">Filter & sort</span>
        <span class="d-sec-meta"><span id="active-filter-lbl">${activeFilter}</span><span id="dc-filters">${secOpen.filters?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" id="ds-filters" style="display:${secOpen.filters?'':'none'}">
        <div style="padding:10px;display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            <button class="fbtn ${activeFilter==='all'?'on':''}"       id="fbtn-all"       onclick="setFilter('all',this,'on')">All items</button>
            <button class="fbtn ${activeFilter==='reorder'?'on-red':''}" id="fbtn-reorder" onclick="setFilter('reorder',this,'on-red')">⚠ Reorder</button>
            <button class="fbtn ${activeFilter==='half'?'on':''}"      id="fbtn-half"      onclick="setFilter('half',this,'on')">▼ Below 50%</button>
            <button class="fbtn ${activeFilter==='overstock'?'on-amber':''}" id="fbtn-overstock" onclick="setFilter('overstock',this,'on-amber')">Overstocked</button>
            <button class="fbtn ${activeFilter==='watch'?'on':''}"     id="fbtn-watch"     onclick="setFilter('watch',this,'on')">Watch list</button>
            <button class="fbtn ${activeFilter==='ok'?'on-green':''}"  id="fbtn-ok"        onclick="setFilter('ok',this,'on-green')">Adequate</button>
            <button class="fbtn ${activeFilter==='nodata'?'on-teal':''}" id="fbtn-nodata"  onclick="setFilter('nodata',this,'on-teal')">No activity</button>
          </div>
          <select class="sort-select" id="sort-select" onchange="currentSort=this.value;applyFilters()" style="width:100%;border-radius:8px;padding:6px 10px">
            <option value="stock_asc"   ${currentSort==='stock_asc'   ?'selected':''}>Stock: Low → High</option>
            <option value="stock_desc"  ${currentSort==='stock_desc'  ?'selected':''}>Stock: High → Low</option>
            <option value="consumption" ${currentSort==='consumption' ?'selected':''}>Highest consumption</option>
            <option value="reorder"     ${currentSort==='reorder'     ?'selected':''}>Reorder gap first</option>
            <option value="name"        ${currentSort==='name'        ?'selected':''}>Name A–Z</option>
          </select>
        </div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('top')">
        <span class="d-sec-title">Top consumed · Jun 1+</span>
        <span class="d-sec-meta"><span>${topItems.length} items</span><span id="dc-top">${secOpen.top?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" id="ds-top" style="display:${secOpen.top?'':'none'}">${topRows}</div>
    </div>
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('reorder')" style="border-left:2px solid var(--red)">
        <span class="d-sec-title" style="color:var(--red)">⚠ Reorder now</span>
        <span class="d-sec-meta"><span>${d.needsReorderCount} items</span><span id="dc-reorder">${secOpen.reorder?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" id="ds-reorder" style="display:${secOpen.reorder?'':'none'}">${critRows}</div>
    </div>
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('avg')">
        <span class="d-sec-title">Monthly avg required qty</span>
        <span class="d-sec-meta"><span>running avg</span><span id="dc-avg">${secOpen.avg?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" id="ds-avg" style="display:${secOpen.avg?'':'none'}">${avgRows}</div>
    </div>
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('daily')">
        <span class="d-sec-title">Daily consumption · ${new Date().toLocaleString('en-IN',{month:'short',year:'numeric'})}</span>
        <span class="d-sec-meta"><span>${dailyEntries.length} days</span><span id="dc-daily">${secOpen.daily?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" id="ds-daily" style="display:${secOpen.daily?'':'none'}">${chartHtml}</div>
    </div>`;

  if(dailyEntries.length && secOpen.daily) setTimeout(renderDailyChart, 50);
}

function renderDailyChart(){
  const canvas = document.getElementById('daily-chart');
  if(!canvas||!storeData.dailyOut) return;
  if(dailyChart){ dailyChart.destroy(); dailyChart=null; }
  const entries = Object.entries(storeData.dailyOut).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!entries.length) return;
  dailyChart = new Chart(canvas,{
    type:'bar',
    data:{
      labels:entries.map(([d])=>new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})),
      datasets:[{label:'Units issued',data:entries.map(([,v])=>Math.round(v)),backgroundColor:'rgba(240,84,35,0.75)',borderRadius:3,borderSkipped:false}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#555',font:{size:9},maxRotation:45,autoSkip:true},grid:{display:false}},
        y:{ticks:{color:'#555',font:{size:9},callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
}

// ── Filters ───────────────────────────────────────────────────
function setFilter(f,btn,cls){
  activeFilter = f; currentPage = 1; expandedCode = null;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-red','on-amber','on-green','on-teal'));
  if(btn) btn.classList.add(cls);
  // Update the drawer's filter label
  const afl = document.getElementById('active-filter-lbl');
  if(afl) afl.textContent = f;
  applyFilters();
}

let currentSort = 'stock_asc';
let liveLabel   = 'Baseline only';

function applyFilters(){
  if(!storeData) return;
  const searchEl = document.getElementById('search-box');
  const sortEl   = document.getElementById('sort-select');
  const q    = searchEl ? searchEl.value.toLowerCase() : '';
  if(sortEl) currentSort = sortEl.value;
  let items  = storeData.items||[];

  if(activeFilter==='reorder')         items=items.filter(i=>i.needsReorder);
  else if(activeFilter==='half')       items=items.filter(i=>i.belowHalfAlert&&!i.needsReorder);
  else if(activeFilter==='overstock')  items=items.filter(i=>i.isOverstocked);
  else if(activeFilter==='watch')      items=items.filter(i=>i.isWatch&&!i.isOverstocked&&!i.needsReorder);
  else if(activeFilter==='ok')         items=items.filter(i=>!i.needsReorder&&!i.belowHalfAlert&&!i.isOverstocked&&!i.isWatch&&i.runningAvgMonthly>0);
  else if(activeFilter==='nodata')     items=items.filter(i=>!i.runningAvgMonthly&&!i.totalReceived&&!i.openingStock);

  if(q) items=items.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.code||'').toLowerCase().includes(q));

  if(currentSort==='stock_asc')        items=[...items].sort((a,b)=>a.currentStock-b.currentStock);
  else if(currentSort==='stock_desc')  items=[...items].sort((a,b)=>b.currentStock-a.currentStock);
  else if(currentSort==='consumption') items=[...items].sort((a,b)=>b.totalIssued-a.totalIssued);
  else if(currentSort==='reorder')     items=[...items].sort((a,b)=>a.stockGap-b.stockGap);
  else if(currentSort==='name')        items=[...items].sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  filteredItems = items;
  const totalPages = Math.ceil(items.length/PAGE_SIZE);
  if(currentPage > totalPages) currentPage = 1;
  renderPage();
}

// ── Pagination ────────────────────────────────────────────────
function goPage(n){
  const total = Math.ceil(filteredItems.length/PAGE_SIZE);
  if(n<1||n>total) return;
  currentPage = n;
  expandedCode = null;
  renderPage();
  document.getElementById('tbl-scroll').scrollTop = 0;
}

function renderPage(){
  const total      = filteredItems.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  const start      = (currentPage-1)*PAGE_SIZE;
  const pageItems  = filteredItems.slice(start, start+PAGE_SIZE);

  // Label — update status bar count
  const sc = document.getElementById('status-count');
  if(sc) sc.textContent = `${total} item${total!==1?'s':''} · page ${currentPage} of ${totalPages}`;
  updateStatusFilter();

  // Rows
  if(!pageItems.length){
    document.getElementById('tbl-body').innerHTML =
      '<tr><td colspan="11" style="padding:2rem;text-align:center;color:var(--text3)">No items match.</td></tr>';
    document.getElementById('pager').style.display = 'none';
    return;
  }

  document.getElementById('tbl-body').innerHTML = pageItems.map(i=>{
    const isExp = expandedCode===i.code;
    const sc    = stockColor(i);
    const detail = isExp ? `<tr class="detail-tr"><td colspan="11" id="detail-${i.code}">${renderDetail(i)}</td></tr>` : '';
    return `
      <tr class="${isExp?'exp-row':''}" onclick="toggleExpand('${i.code}')">
        <td class="name-col"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.name||i.code}</div><div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px">${i.code}</div></td>
        <td>${i.uom||'—'}</td>
        <td style="color:${sc};font-weight:500">${fmt(i.currentStock)}</td>
        <td>${fmt(i.openingStock)}</td>
        <td style="color:var(--teal)">${fmt(i.totalReceived)}</td>
        <td style="color:var(--orange)">${fmt(i.totalIssued)}</td>
        <td style="color:var(--text3)">${fmt(i.baselineAvgMonthly)}</td>
        <td style="color:var(--orange)">${fmt(i.runningAvgMonthly)}</td>
        <td>${fmt(i.reorderPoint)}</td>
        <td style="color:${i.stockGap<0?'var(--red)':'var(--green)'}">${fmt(i.stockGap)}</td>
        <td>${itemBadge(i)}</td>
      </tr>${detail}`;
  }).join('');

  // Pager
  const pager = document.getElementById('pager');
  pager.style.display = total > PAGE_SIZE ? 'flex' : 'none';
  document.getElementById('pager-info').textContent =
    `${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}`;
  document.getElementById('pg-prev').disabled = currentPage<=1;
  document.getElementById('pg-next').disabled = currentPage>=totalPages;

  // Page number buttons — show max 7 around current
  const nums = document.getElementById('pg-nums');
  const pages = [];
  for(let p=1;p<=totalPages;p++){
    if(p===1||p===totalPages||Math.abs(p-currentPage)<=2) pages.push(p);
    else if(pages[pages.length-1]!=='…') pages.push('…');
  }
  nums.innerHTML = pages.map(p=>
    p==='…'
      ? '<span style="color:var(--text3);padding:0 3px;font-size:11px">…</span>'
      : `<button class="pager-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`
  ).join('');
}

// ── Focus from drawer ─────────────────────────────────────────
function focusItem(code){
  setFilter('all', null, 'on');
  expandedCode = code;
  const allItems = filteredItems.length ? filteredItems : (storeData.items||[]);
  const idx = allItems.findIndex(i=>i.code===code);
  currentPage = idx>=0 ? Math.ceil((idx+1)/PAGE_SIZE) : 1;
  applyFilters();
  setTimeout(()=>{
    const el = document.getElementById('detail-'+code);
    if(el) el.closest('tr').previousElementSibling?.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
  if(!detailCache[code]) fetchDetail(code);
}

// ── Detail expand ─────────────────────────────────────────────
async function toggleExpand(code){
  if(expandedCode===code){ expandedCode=null; renderPage(); return; }
  expandedCode = code;
  renderPage();
  if(!detailCache[code]) fetchDetail(code);
}

async function fetchDetail(code){
  const el = document.getElementById('detail-'+code);
  if(el) el.innerHTML='<div style="padding:10px 14px;color:var(--text3);font-family:DM Mono,monospace;font-size:11px"><span class="spin"></span> Loading…</div>';
  try {
    const res  = await fetch(API_URL+'?type=store&detail='+encodeURIComponent(code)+'&t='+Date.now());
    const data = await res.json();
    detailCache[code] = data;
    if(expandedCode===code) renderPage();
  } catch(e){
    if(document.getElementById('detail-'+code))
      document.getElementById('detail-'+code).innerHTML='<div style="padding:10px;color:var(--red);font-size:11px">Failed to load</div>';
  }
}

function renderDetail(item){
  const cached   = detailCache[item.code];
  const received = cached ? cached.received : (item.recentReceived||[]);
  const issued   = cached ? cached.issued   : (item.recentIssued||[]);
  const recRows  = received.length
    ? received.slice(0,10).map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${fmt(r.qty)} ${r.uom||item.uom}</td><td style="color:var(--text3)">${r.remarks||'RECEIVED'}</td></tr>`).join('')
    : '<tr><td colspan="3" style="color:var(--text3)">No receipts since Jun 1</td></tr>';
  const issRows  = issued.length
    ? issued.slice(0,10).map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${fmt(r.qty)}</td><td>${r.dept||'—'}</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis">${r.project||'—'}</td></tr>`).join('')
    : '<tr><td colspan="4" style="color:var(--text3)">No issues since Jun 1</td></tr>';
  const halfThr  = item.runningAvgMonthly*0.5;
  const alertHtml = item.belowHalfAlert
    ? `<div style="background:var(--purple-dim);border:1px solid rgba(168,85,247,.2);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--purple);font-family:'DM Mono',monospace;margin-bottom:8px">
        ▼ Stock (${fmt(item.currentStock)} ${item.uom}) below 50% of monthly avg (${fmt(halfThr)} ${item.uom}) — replenish soon
       </div>` : '';
  return `
  <div class="item-detail">
    ${alertHtml}
    <div class="detail-grid">
      <div class="detail-stat">
        <div class="detail-stat-lbl">Baseline avg/mo</div>
        <div class="detail-stat-val" style="color:var(--text2)">${fmt(item.baselineAvgMonthly)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
        <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">Jan–May 2026</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Running avg/mo</div>
        <div class="detail-stat-val" style="color:var(--orange)">${fmt(item.runningAvgMonthly)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
        <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">blended · updates monthly</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Opening (Jun 1)</div>
        <div class="detail-stat-val" style="color:var(--blue)">${fmt(item.openingStock)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Received (Jun+)</div>
        <div class="detail-stat-val" style="color:var(--teal)">${fmt(item.totalReceived)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Issued (Jun+)</div>
        <div class="detail-stat-val" style="color:var(--orange)">${fmt(item.totalIssued)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Current stock</div>
        <div class="detail-stat-val" style="color:${stockColor(item)}">${fmt(item.currentStock)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Safety stock</div>
        <div class="detail-stat-val">${fmt(item.safetyStock)} <span style="font-size:9px;color:var(--text3)">${item.uom}</span></div>
        <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">3-wk lead + 25% surge</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-lbl">Months remaining</div>
        <div class="detail-stat-val" style="color:${item.monthsRemaining<1?'var(--red)':item.monthsRemaining>3?'var(--amber)':'var(--green)'}">${item.monthsRemaining>=99?'∞':fmt(item.monthsRemaining,1)}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div>
        <div class="section-lbl">Recent receipts (Jun+)</div>
        <table class="mini-table"><thead><tr><th>Date</th><th>Qty</th><th>Type</th></tr></thead><tbody>${recRows}</tbody></table>
      </div>
      <div>
        <div class="section-lbl">Recent issues (Jun+)</div>
        <table class="mini-table"><thead><tr><th>Date</th><th>Qty</th><th>Dept</th><th>Project</th></tr></thead><tbody>${issRows}</tbody></table>
      </div>
    </div>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────
loadData(false);
scheduleRefresh();
</script>
</body>
</html>
