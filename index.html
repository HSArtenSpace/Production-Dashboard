<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Floor · Artenspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.13);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.13);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.13);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.13);
  --orange:#f05423;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.shell{max-width:1400px;margin:0 auto;padding:28px 24px}

/* ── Header ── */
/* ── Header — centred logo, nav left, search icon right ── */
.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:24px;gap:10px}
.header-left{display:flex;gap:8px;align-items:center}
.brand-link{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;justify-content:center}
.brand-logo{height:22px;width:auto;flex-shrink:0}
.brand-divider{width:1px;height:16px;background:var(--border2);flex-shrink:0}
.brand-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);white-space:nowrap;display:flex;align-items:center;gap:6px}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .4s;flex-shrink:0}
.header-right{display:flex;gap:8px;align-items:center;justify-content:flex-end}
/* Search icon */
.search-icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.search-icon-btn:hover,.search-icon-btn.open{background:var(--bg4);color:var(--text);border-color:var(--blue)}
.search-wrap{position:relative}
.search-dropdown{position:absolute;top:100%;right:0;margin-top:6px;z-index:200;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;min-width:260px}
.search-dropdown.open{display:block}
.search{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);width:100%;outline:none;display:block}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}
@media(max-width:640px){.header{grid-template-columns:auto 1fr}.header-left{display:none}}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:var(--bg4);color:var(--text)}

/* ── Countdown ring ── */
.refresh-ring{width:14px;height:14px;flex-shrink:0}
.refresh-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:2.5}
.ring-fill{fill:none;stroke:var(--blue);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .9s linear;stroke-dasharray:44;stroke-dashoffset:44}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace}
.stat-val{font-size:24px;font-weight:500}
.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-purple{color:var(--purple)}

/* ── Filters ── */
.filter-row{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fbtn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.fbtn.on-amber{background:var(--amber);border-color:var(--amber);color:#000}
.fbtn.on-green{background:var(--green);border-color:var(--green);color:#000}
.fbtn.on-purple{background:var(--purple);border-color:var(--purple);color:#fff}

/* ── Sort ── */
.sort-wrap{margin-left:auto}
.sort-select{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-size:12px;outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.sort-select:hover{border-color:var(--border2);color:var(--text)}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}

/* ── Card ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.card:hover{border-color:var(--border2)}
.card.open{border-color:rgba(59,130,246,.35)}
.card.at-risk{border-color:rgba(239,68,68,.3)}
.card-top{padding:15px 17px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:9px}
.proj-name{font-size:14px;font-weight:500;line-height:1.3}
.proj-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.card-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:10px;padding:3px 8px;border-radius:999px;white-space:nowrap;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.03em}
.b-wip{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-hold{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.b-done{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-ns{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.b-risk{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.open-btn{font-size:10px;padding:3px 8px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap;text-decoration:none}
.open-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── Progress ── */
.prog-area{margin:9px 0 7px}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.prog-pct{font-family:'DM Mono',monospace;color:var(--text2)}
.track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px}

/* ── Tags ── */
.tags-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:7px}
.dept-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 9px;border-radius:999px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.dept-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}
.deadline{font-size:11px;font-family:'DM Mono',monospace}
.dl-late{color:var(--red)}.dl-soon{color:var(--amber)}.dl-ok{color:var(--text3)}
.activity-tag{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.activity-tag.stale{color:var(--amber)}
.risk-tag{font-size:11px;font-family:'DM Mono',monospace;color:var(--red)}

/* ── Expand hint ── */
.expand-hint{font-size:11px;color:var(--text3);margin-top:8px;display:flex;align-items:center;gap:4px}

/* ── Products ── */
.products-wrap{border-top:1px solid var(--border);padding:13px 17px;background:rgba(0,0,0,.25)}
.sec-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:10px}
.prod{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.prod:last-child{margin-bottom:0}
.prod-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:5px}
.prod-name{font-size:12px;font-weight:500}
.prod-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.prod-pct{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);white-space:nowrap}
.prod-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:4px 0 5px}
.prod-fill{height:100%;border-radius:2px}
.dep-chips{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0}
.chip{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border);color:var(--text3);font-family:'DM Mono',monospace}
.chip.cur{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.done-chip{background:var(--green-dim);border-color:rgba(34,197,94,.2);color:var(--green)}
.prod-activity{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px}
.prod-activity.stale{color:var(--amber)}

/* ── Mat table ── */
.mat-dept-block{margin-top:8px}
.mat-dept-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;padding-bottom:3px;border-bottom:1px solid var(--border);margin-bottom:3px}
.mat-table{width:100%;border-collapse:collapse;font-size:11px}
.mat-table th{color:var(--text3);text-align:left;padding:3px 4px;font-weight:400;font-family:'DM Mono',monospace;font-size:10px}
.mat-table td{padding:4px 4px;border-top:1px solid var(--border);color:var(--text2)}
.mat-table td:first-child{color:var(--text)}
.mat-table td:last-child{text-align:right;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}

/* ── Project page ── */
.proj-page{display:none}
.proj-page.active{display:block}
.dashboard-view{display:block}
.dashboard-view.hidden{display:none}
.proj-page-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 24px;margin:-28px -24px 24px}
.proj-page-title{font-size:18px;font-weight:600;margin-bottom:4px}
.proj-page-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.proj-page-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.risk-banner{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:flex-start;gap:10px}
.risk-banner-icon{font-size:18px;flex-shrink:0}
.risk-banner-text{font-size:12px;line-height:1.6}
.risk-banner-title{font-weight:600;color:var(--red);margin-bottom:2px}

/* ── Activity feed ── */
.feed-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px}
.feed-dot.stale{background:var(--amber)}
.feed-body{flex:1;min-width:0}
.feed-proj{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-prod{font-size:11px;color:var(--text2);margin-top:1px}
.feed-dept{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2);font-family:'DM Mono',monospace;margin-top:4px}
.feed-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
/* ── Dept drill banner ── */
.dept-banner{background:var(--blue-dim);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.dept-banner-text{font-size:13px;font-weight:500}
.dept-banner-count{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.dept-banner-clear{font-size:11px;color:var(--text3);cursor:pointer;padding:3px 10px;border-radius:999px;border:1px solid var(--border2);background:transparent;font-family:'DM Mono',monospace}
.dept-banner-clear:hover{color:var(--text);border-color:var(--text2)}
/* ── Dept selector ── */
.dept-selector{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:18px}
.dept-selector-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:10px}
.dept-chips-grid{display:flex;gap:8px;flex-wrap:wrap}
.dept-chip-btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.dept-chip-btn:hover{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.dept-chip-count{font-size:10px;font-family:'DM Mono',monospace;background:var(--bg4);padding:1px 6px;border-radius:999px}
/* ── Loader / Error ── */
.loader{padding:3rem;text-align:center;color:var(--text3)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{padding:2rem;text-align:center;background:var(--bg2);border:1px solid rgba(239,68,68,.2);border-radius:12px}
.err-title{color:var(--red);font-size:14px;font-weight:500;margin-bottom:8px}
.err-msg{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:8px}

/* ── Drawer ── */
--drawer-w:400px;
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;bottom:0;width:400px;background:var(--bg2);border-left:1px solid var(--border2);z-index:101;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.drawer-close{background:none;border:1px solid var(--border);color:var(--text3);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.drawer-close:hover{background:var(--bg3);color:var(--text)}
.drawer-body{flex:1;overflow-y:auto}
.d-section{border-bottom:1px solid var(--border)}
.d-sec-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.d-sec-head:hover{background:rgba(255,255,255,.02)}
.d-sec-title{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2)}
.d-sec-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace}
.d-sec-body{padding:8px 14px 14px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi-tile{background:var(--bg3);border-radius:8px;padding:9px 10px}
.kpi-label{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:500;line-height:1.1}
.kpi-sub{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.btn-panel{font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-panel:hover{background:var(--bg4);color:var(--text)}
.btn-panel.active{border-color:var(--orange);color:var(--orange)}
/* sort inside drawer */
.drawer-sort{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none}

</style>
</head>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz_suji7p0oLb7ds5IrljI0N13VAIe3UFbkxlq1zXdWFPprqYvLRNwC1kam45zKG7LA/exec';
const REFRESH_INTERVAL = 300000;
const DISPATCH_DAYS = 60;
const RISK_DAYS_BEFORE = 14;
const RISK_PCT_THRESHOLD = 75;
const BUFFER_DAYS = 14;

let allProjects = [];
let activeFilter = 'all';
let expandedId = null;
let expandedProdId = null;
let sortMode = 'latestActivity';
let isFirstLoad = true;
let isFetching = false;
let refreshTimer = null;
let countdownTimer = null;
let currentProjectPage = null;
let deptFilter = null;

// ── Deadline logic ──
function getDeadlineInfo(proj){
  const today = new Date(); today.setHours(0,0,0,0);

  // Effective start: sheet start date OR first material date + 7 days
  let effectiveStart = null;
  if(proj.sheetStartDate){
    const d = new Date(proj.sheetStartDate);
    if(!isNaN(d)) effectiveStart = d;
  }
  if(!effectiveStart && proj.firstMaterialDate){
    const d = new Date(proj.firstMaterialDate);
    if(!isNaN(d)){ d.setDate(d.getDate()+7); effectiveStart = d; }
  }
  if(!effectiveStart) return null;

  const expectedDispatch = new Date(effectiveStart);
  expectedDispatch.setDate(expectedDispatch.getDate() + DISPATCH_DAYS);

  const riskThreshold = new Date(expectedDispatch);
  riskThreshold.setDate(riskThreshold.getDate() - RISK_DAYS_BEFORE);

  const daysToDispatch = Math.ceil((expectedDispatch - today) / 864e5);
  const isAtRisk = today >= riskThreshold && proj.overallPct < RISK_PCT_THRESHOLD && proj.status !== 'completed';

  const projectedDispatch = new Date(expectedDispatch);
  projectedDispatch.setDate(projectedDispatch.getDate() + BUFFER_DAYS);

  return {
    effectiveStart,
    expectedDispatch,
    daysToDispatch,
    isAtRisk,
    projectedDispatch,
    riskThreshold
  };
}

function formatDate(d){
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

function fillColor(pct){
  if(pct>=99) return '#22c55e';
  if(pct>=70) return '#3b82f6';
  if(pct>=60) return '#f59e0b';
  return '#6366f1';
}

function timeSince(iso){
  if(!iso) return null;
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff/3600000);
  if(h<1) return 'activity < 1h ago';
  if(h<24) return `activity ${h}h ago`;
  return `activity ${Math.floor(h/24)}d ago`;
}

// ── Countdown ──
function startCountdown(){
  stopCountdown();
  const ring = document.getElementById('ring-fill');
  if(!ring) return;
  let elapsed = 0;
  ring.style.strokeDashoffset = 44;
  countdownTimer = setInterval(()=>{
    elapsed += 500;
    ring.style.strokeDashoffset = 44 - (44 * elapsed / REFRESH_INTERVAL);
  }, 500);
}
function stopCountdown(){
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  const ring = document.getElementById('ring-fill');
  if(ring) ring.style.strokeDashoffset = 44;
}

// ── Data ──
async function loadData(silent=false){
  if(isFetching) return;
  isFetching = true;
  if(!silent && isFirstLoad){
    document.getElementById('main-area').innerHTML = '<div class="loader"><span class="spin"></span>Loading live production data...</div>';
  }
  document.getElementById('brand-dot').style.background = '#f59e0b';
  document.getElementById('sync-text').textContent = 'Syncing...';
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    allProjects = data.projects || [];
    const now = new Date(data.generatedAt);
    document.getElementById('brand-dot').style.background = '#22c55e';
    document.getElementById('sync-text').textContent = `Synced ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})} · ${allProjects.length} projects`;
    document.getElementById('refresh-ring').style.display = 'flex';
    updateTabTitle();
    const scrollY = silent ? window.scrollY : 0;
    if(currentProjectPage){
      const proj = allProjects.find(p=>p.id===currentProjectPage);
      if(proj) renderProjectPage(proj);
    } else {
      applyFilters();
      if(silent && scrollY) window.scrollTo({top:scrollY,behavior:'instant'});
    }
    isFirstLoad = false;
  } catch(e){
    document.getElementById('brand-dot').style.background = '#ef4444';
    document.getElementById('sync-text').textContent = 'Failed to sync';
    if(isFirstLoad){
      document.getElementById('main-area').innerHTML = `<div class="err-box"><div class="err-title">Could not load data</div><div class="err-msg">${e.message}</div></div>`;
    }
  } finally { isFetching = false; }
}

function manualRefresh(){ stopCountdown(); clearInterval(refreshTimer); loadData(false); scheduleRefresh(); }
function scheduleRefresh(){
  clearInterval(refreshTimer); startCountdown();
  refreshTimer = setInterval(()=>{ loadData(true); startCountdown(); }, REFRESH_INTERVAL);
}

// ── Navigation ──
function openProject(projId, e){
  if(e){ e.stopPropagation(); e.preventDefault(); }
  // Collapse card on main view
  if(expandedId === projId){ expandedId = null; applyFilters(); }
  // Open in new tab
  const url = location.origin + location.pathname + '#project/' + projId;
  window.open(url, '_blank');
}

function toggleSearch(){
  const btn = document.getElementById('search-icon-btn');
  const dd  = document.getElementById('search-dropdown');
  const isOpen = dd.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  if(isOpen) setTimeout(()=>document.getElementById('search-box').focus(), 50);
}
document.addEventListener('click', e => {
  const wrap = document.querySelector('.search-wrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('search-dropdown')?.classList.remove('open');
    document.getElementById('search-icon-btn')?.classList.remove('open');
  }
});

function goHome(){
  if(currentProjectPage){
    currentProjectPage = null;
    document.getElementById('proj-page').classList.remove('active');
    document.getElementById('dashboard-view').classList.remove('hidden');
    document.getElementById('search-box').style.display = '';
    window.location.hash = '';
    applyFilters();
  }
}

function showProjectPage(projId){
  const proj = allProjects.find(p=>p.id===projId);
  if(!proj){ goHome(); return; }
  currentProjectPage = projId;
  document.getElementById('dashboard-view').classList.add('hidden');
  document.getElementById('search-box').style.display = 'none';
  document.getElementById('proj-page').classList.add('active');
  renderProjectPage(proj);
}

// ── Filters ──
function setFilter(f,btn,cls){
  activeFilter=f;
  deptFilter=null;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amber','on-green','on-purple'));
  btn.classList.add(cls); applyFilters();
}
function setDeptFilter(dept,e){
  if(e){ e.stopPropagation(); }
  deptFilter=dept;
  activeFilter='dept';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amber','on-green','on-purple'));
  applyFilters();
}
function clearDeptFilter(){
  deptFilter=null;
  activeFilter='all';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amber','on-green','on-purple'));
  document.getElementById('fbtn-all').classList.add('on');
  applyFilters();
}
function showDeptSelector(btn){
  activeFilter='dept_select';
  deptFilter=null;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amber','on-green','on-purple'));
  btn.classList.add('on');
  renderStats();
  // Build dept counts from live projects
  const deptMap={};
  allProjects.forEach(proj=>{
    if(proj.status==='completed'||proj.status==='not_started') return;
    proj.products.forEach(p=>{
      if(!p.currentDept||p.isDispatched) return;
      if(!deptMap[p.currentDept]) deptMap[p.currentDept]=0;
      deptMap[p.currentDept]++;
    });
  });
  const depts=Object.entries(deptMap).sort((a,b)=>b[1]-a[1]);
  if(!depts.length){
    document.getElementById('main-area').innerHTML='<div class="loader" style="color:var(--text3)">No active departments found.</div>';
    return;
  }
  const selector=`<div class="dept-selector">
    <div class="dept-selector-title">Select a department to see all active products</div>
    <div class="dept-chips-grid">
      ${depts.map(([dept,count])=>`
        <button class="dept-chip-btn" onclick="setDeptFilter('${dept.replace(/'/g,"\'")}',event)">
          ${dept}<span class="dept-chip-count">${count}</span>
        </button>`).join('')}
    </div>
  </div>`;
  document.getElementById('main-area').innerHTML=selector;
}

function changeSort(mode){
  sortMode=mode;
  const q=(document.getElementById('search-box').value||'').toLowerCase();
  if(activeFilter==='activity'){
    renderStats();
    renderActivityFeed(q);
    return;
  }
  if(activeFilter==='dept' && deptFilter){
    renderStats();
    renderDeptDrilldown(deptFilter, q);
    return;
  }
  applyFilters();
}
function applyFilters(){
  if(currentProjectPage) return;
  const q=(document.getElementById('search-box').value||'').toLowerCase();

  // ── Activity feed mode ──
  if(activeFilter==='activity'){
    renderStats();
    renderActivityFeed(q);
    return;
  }

  // ── Dept selector landing ──
  if(activeFilter==='dept_select'){ return; }

  // ── Dept drill-down mode ──
  if(activeFilter==='dept' && deptFilter){
    renderStats();
    renderDeptDrilldown(deptFilter, q);
    return;
  }

  let list=allProjects;
  if(activeFilter==='all') list=list.filter(p=>p.status!=='completed'&&p.status!=='not_started');
  else if(activeFilter==='not_started') list=list.filter(p=>p.status==='not_started');
  else list=list.filter(p=>p.status===activeFilter);
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));
  list.sort((a,b)=>{
    if(sortMode==='latestActivity')  return new Date(b.lastActivity||0)-new Date(a.lastActivity||0);
    if(sortMode==='oldestActivity')  return new Date(a.lastActivity||0)-new Date(b.lastActivity||0);
    if(sortMode==='highestProgress') return b.overallPct-a.overallPct;
    if(sortMode==='lowestProgress')  return a.overallPct-b.overallPct;
    const na=parseInt((a.code||'').replace(/\D/g,''))||0;
    const nb=parseInt((b.code||'').replace(/\D/g,''))||0;
    if(sortMode==='newestProject') return nb-na;
    if(sortMode==='oldestProject') return na-nb;
    return 0;
  });
  renderStats(); renderGrid(list);
}

// ── Activity Feed renderer ──
function renderActivityFeed(q){
  const cutoff72h = Date.now() - 72*3600000;
  const items = [];
  allProjects.forEach(proj=>{
    if(proj.status==='not_started'||proj.status==='completed') return;
    proj.products.forEach(p=>{
      if(!p.latestActivityDate) return;
      if(p.isDispatched) return;
      const t = new Date(p.latestActivityDate).getTime();
      if(t < cutoff72h) return;
      if(q && !proj.name.toLowerCase().includes(q) && !proj.code.toLowerCase().includes(q) && !(p.name||'').toLowerCase().includes(q)) return;
      items.push({proj, p, t});
    });
  });
  items.sort((a,b)=> sortMode==='oldestActivity' ? a.t-b.t : b.t-a.t);

  if(!items.length){
    document.getElementById('main-area').innerHTML='<div class="loader" style="color:var(--text3)">No activity in the last 72 hours.</div>';
    return;
  }

  const html=`<div style="margin-bottom:10px;font-size:11px;color:var(--text3);font-family:DM Mono,monospace">${items.length} product${items.length!==1?'s':''} active in last 72h</div>`+
    items.map(({proj,p,t})=>{
      const diff=Date.now()-t;
      const h=Math.floor(diff/3600000);
      const timeStr=h<1?'< 1h ago':h<24?h+'h ago':Math.floor(h/24)+'d ago';
      const isStale=diff>48*3600000;
      return `<div class="feed-item">
        <div class="feed-dot${isStale?' stale':''}"></div>
        <div class="feed-body">
          <div class="feed-proj">${proj.name||proj.code} <span style="color:var(--text3);font-weight:400">· ${proj.code}</span></div>
          <div class="feed-prod">${p.name||p.code}${p.qty?' · Qty: '+p.qty:''}</div>
          ${p.currentDept?`<span class="feed-dept">${p.currentDept}</span>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="feed-time">${timeStr}</div>
          <a class="open-btn" onclick="openProject('${proj.id}',event)" href="#project/${proj.id}">↗</a>
        </div>
      </div>`;
    }).join('');
  document.getElementById('main-area').innerHTML=html;
}

// ── Dept Drill-down renderer ──
function renderDeptDrilldown(dept, q){
  const items=[];
  allProjects.forEach(proj=>{
    if(proj.status==='completed'||proj.status==='not_started') return;
    proj.products.forEach(p=>{
      if((p.currentDept||'').toLowerCase()===dept.toLowerCase() && !p.isDispatched){
        if(q && !proj.name.toLowerCase().includes(q) && !proj.code.toLowerCase().includes(q)) return;
        items.push({proj,p});
      }
    });
  });
  items.sort((a,b)=>{
    if(sortMode==='highestProgress') return b.p.pct-a.p.pct;
    if(sortMode==='lowestProgress')  return a.p.pct-b.p.pct;
    if(!a.p.latestActivityDate&&!b.p.latestActivityDate) return 0;
    if(!a.p.latestActivityDate) return 1;
    if(!b.p.latestActivityDate) return -1;
    return sortMode==='oldestActivity'
      ? new Date(a.p.latestActivityDate)-new Date(b.p.latestActivityDate)
      : new Date(b.p.latestActivityDate)-new Date(a.p.latestActivityDate);
  });

  const banner=`<div class="dept-banner">
    <div>
      <div class="dept-banner-text">&#127981; ${dept}</div>
      <div class="dept-banner-count">${items.length} product${items.length!==1?'s':''} currently in this department</div>
    </div>
    <button class="dept-banner-clear" onclick="clearDeptFilter()">✕ Clear filter</button>
  </div>`;

  if(!items.length){
    document.getElementById('main-area').innerHTML=banner+'<div class="loader" style="color:var(--text3)">No active products in this department.</div>';
    return;
  }

  const feedHtml=items.map(({proj,p})=>{
    const actStr=p.latestActivityDate?timeSince(p.latestActivityDate):'';
    const pStale=p.latestActivityDate&&(Date.now()-new Date(p.latestActivityDate).getTime())>72*3600000;
    return `<div class="feed-item">
      <div class="feed-dot${pStale?' stale':''}"></div>
      <div class="feed-body">
        <div class="feed-proj">${proj.name||proj.code} <span style="color:var(--text3);font-weight:400">· ${proj.code}</span></div>
        <div class="feed-prod">${p.name||p.code}${p.qty?' · Qty '+p.qty:''}</div>
        <div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:3px">${p.pct}% complete${actStr?' · '+actStr:''}</div>
      </div>
      <a class="open-btn" onclick="openProject('${proj.id}',event)" href="#project/${proj.id}">↗</a>
    </div>`;
  }).join('');
  document.getElementById('main-area').innerHTML=banner+feedHtml;
}

function updateTabTitle(){
  const atRisk = allProjects.filter(p=>{
    const dl=getDeadlineInfo(p);
    return dl&&dl.isAtRisk;
  }).length;
  const onHold = allProjects.filter(p=>p.status==='hold').length;
  const alertCount = atRisk + onHold;
  document.title = alertCount>0 ? `(${alertCount}) Production Floor · Artenspace` : 'Production Floor · Artenspace';
}

function renderStats(){
  // Stats now live in the drawer — refresh drawer if open
  if(drawerOpen) renderDrawer();
}

function toggleCard(id){
  expandedId=expandedId===id?null:id;
  window.location.hash=expandedId?expandedId:'';
  applyFilters();
}
function toggleProd(id,e){
  e.stopPropagation();
  expandedProdId=expandedProdId===id?null:id;
  if(currentProjectPage){
    const proj=allProjects.find(p=>p.id===currentProjectPage);
    if(proj) renderProjectPage(proj);
  } else {
    applyFilters();
  }
}

// ── Shared product renderer ──
function renderProduct(p, projId){
  const chips=p.deptSet.map(d=>{
    const isCur=d===p.currentDept&&!p.isDispatched;
    const isDone=!isCur&&p.deptSet.indexOf(d)<p.deptSet.indexOf(p.currentDept);
    const clickable=isCur?` onclick="setDeptFilter('${d.replace(/'/g,"\\'")}',event)" title="See all products in ${d.replace(/'/g,"\\'")} dept" style="cursor:pointer"`:'';
    return `<span class="chip${isCur?' cur':isDone?' done-chip':''}"${clickable}>${d}</span>`;
  }).join('')||`<span class="chip cur" onclick="setDeptFilter('${(p.currentDept||'').replace(/'/g,"\\'")}',event)" style="cursor:pointer">${p.currentDept||'Not started'}</span>`;

  const matByDept={};
  (p.recentMat||[]).forEach(m=>{
    if(!matByDept[m.dept]) matByDept[m.dept]=[];
    matByDept[m.dept].push(m);
  });
  const matHtml=Object.entries(matByDept).slice(0,5).map(([dept,items])=>`
    <div class="mat-dept-block">
      <div class="mat-dept-lbl">${dept}</div>
      <table class="mat-table">
        <thead><tr><th>Material</th><th>Qty</th><th>Receiver</th></tr></thead>
        <tbody>${items.slice(0,6).map(m=>`
          <tr>
            <td>${m.material}${m.spec?` <span style="color:var(--text3);font-size:10px">${m.spec}</span>`:''}</td>
            <td>${m.qty} ${m.uom}</td>
            <td>${m.receiver}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');

  const pActStr=timeSince(p.latestActivityDate);
  const pStale=p.latestActivityDate&&(Date.now()-new Date(p.latestActivityDate).getTime())>72*3600000;
  const uid=projId+'__'+p.code;

  return `<div class="prod">
    <div class="prod-head">
      <div>
        <div class="prod-name">${p.name||p.code}</div>
        <div class="prod-code">${p.code}${p.qty?' · Qty: '+p.qty:''}</div>
      </div>
      <div class="prod-pct">${p.pct}%</div>
    </div>
    <div class="prod-track"><div class="prod-fill" style="width:${p.pct}%;background:${fillColor(p.pct)}"></div></div>
    <div class="dep-chips">${chips}</div>
    ${pActStr?`<div class="prod-activity${pStale?' stale':''}">${pActStr}</div>`:''}
    <div class="expand-hint" onclick="toggleProd('${uid}',event)" style="margin-top:6px;font-size:11px">
      ${expandedProdId===uid?'▲ Hide materials':'▼ View materials'}
    </div>
    ${expandedProdId===uid?matHtml:''}
  </div>`;
}

function sortedProducts(products){
  return [...products].sort((a,b)=>{
    if(!a.latestActivityDate&&!b.latestActivityDate) return 0;
    if(!a.latestActivityDate) return 1;
    if(!b.latestActivityDate) return -1;
    return new Date(b.latestActivityDate)-new Date(a.latestActivityDate);
  });
}

// ── Render grid card ──
function renderGrid(list){
  if(!list.length){
    document.getElementById('main-area').innerHTML='<div class="loader" style="color:var(--text3)">No projects match.</div>';
    return;
  }
  document.getElementById('main-area').innerHTML=`<div class="grid">${list.map(proj=>{
    const expanded=expandedId===proj.id;
    const dl=getDeadlineInfo(proj);
    const isRisk=dl&&dl.isAtRisk;
    const bCls={wip:'b-wip',hold:'b-hold',completed:'b-done',not_started:'b-ns'}[proj.status]||'b-wip';
    const bLbl={wip:'WIP',hold:'ON HOLD',completed:'DISPATCHED',not_started:'NOT STARTED'}[proj.status]||'WIP';
    const fc=fillColor(proj.overallPct);

    // Deadline tag on card
    let dlHtml='';
    if(dl){
      if(isRisk){
        dlHtml=`<span class="risk-tag">⚠️ At risk · ${formatDate(dl.projectedDispatch)} projected</span>`;
      } else {
        const cls=dl.daysToDispatch<0?'dl-late':dl.daysToDispatch<=14?'dl-soon':'dl-ok';
        const txt=dl.daysToDispatch<0?`${Math.abs(dl.daysToDispatch)}d overdue`:dl.daysToDispatch===0?'Due today':`${dl.daysToDispatch}d to dispatch`;
        dlHtml=`<span class="deadline ${cls}">&#128197; ${txt}</span>`;
      }
    }

    const actStr=timeSince(proj.lastActivity);
    const isStale=proj.status==='hold';
    const actHtml=actStr?`<span class="activity-tag${isStale?' stale':''}">&#9679; ${actStr}</span>`:'';

    let prodsHtml='';
    if(expanded){
      prodsHtml=`<div class="products-wrap">
        <div class="sec-label">${proj.products.length} product${proj.products.length!==1?'s':''}</div>
        ${sortedProducts(proj.products).map(p=>renderProduct(p,proj.id)).join('')}
      </div>`;
    }

    return `<div class="card${expanded?' open':''}${isRisk?' at-risk':''}" onclick="toggleCard('${proj.id}')">
      <div class="card-top">
        <div class="card-head">
          <div>
            <div class="proj-name">${proj.name||proj.code}</div>
            <div class="proj-meta">${proj.code} · ${proj.products.length} product${proj.products.length!==1?'s':''}</div>
          </div>
          <div class="card-actions">
            <a class="open-btn" onclick="openProject('${proj.id}',event)" href="#project/${proj.id}" title="Open full project page">↗</a>
            <span class="badge ${bCls}${isRisk?' b-risk':''}">${isRisk?'⚠ AT RISK':bLbl}</span>
          </div>
        </div>
        <div class="prog-area">
          <div class="prog-lbl"><span>Progress</span><span class="prog-pct">${proj.overallPct}%</span></div>
          <div class="track"><div class="fill" style="width:${proj.overallPct}%;background:${fc}"></div></div>
        </div>
        <div class="tags-row">
          ${proj.overallDept?`<span class="dept-tag"><span class="dept-dot"></span>${proj.overallDept}</span>`:''}
          ${dlHtml}
          ${actHtml}
        </div>
        <div class="expand-hint">${expanded?'&#9650;':'&#9660;'} ${expanded?'Collapse':'View products & materials'}</div>
      </div>
      ${prodsHtml}
    </div>`;
  }).join('')}</div>`;
}

// ── Full project page ──
function renderProjectPage(proj){
  const dl=getDeadlineInfo(proj);
  const isRisk=dl&&dl.isAtRisk;
  const bCls={wip:'b-wip',hold:'b-hold',completed:'b-done',not_started:'b-ns'}[proj.status]||'b-wip';
  const bLbl={wip:'WIP',hold:'ON HOLD',completed:'DISPATCHED',not_started:'NOT STARTED'}[proj.status]||'WIP';
  const fc=fillColor(proj.overallPct);

  let riskBanner='';
  if(isRisk){
    riskBanner=`<div class="risk-banner">
      <div class="risk-banner-icon">⚠️</div>
      <div class="risk-banner-text">
        <div class="risk-banner-title">Project at risk of delay</div>
        Progress is ${proj.overallPct}% — needs to be ${RISK_PCT_THRESHOLD}% by ${formatDate(dl.riskThreshold)} to dispatch on time.<br>
        Expected dispatch: <strong>${formatDate(dl.expectedDispatch)}</strong> &nbsp;·&nbsp;
        Projected if delayed: <strong>${formatDate(dl.projectedDispatch)}</strong>
      </div>
    </div>`;
  }

  let deadlineMeta='';
  if(dl){
    deadlineMeta=`<span>&#128197; ${isRisk?'⚠ At risk · ':''}Expected dispatch: ${formatDate(dl.expectedDispatch)} (${dl.daysToDispatch>0?dl.daysToDispatch+'d remaining':Math.abs(dl.daysToDispatch)+'d overdue'})</span>`;
  }

  const prods=sortedProducts(proj.products);

  document.getElementById('proj-page-content').innerHTML=`
    <div class="proj-page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div class="proj-page-title">${proj.name||proj.code}</div>
            <span class="badge ${isRisk?'b-risk':bCls}">${isRisk?'⚠ AT RISK':bLbl}</span>
          </div>
          <div class="proj-page-meta">
            <span>${proj.code}</span>
            <span>${proj.products.length} products</span>
            ${proj.overallDept?`<span>Currently in: ${proj.overallDept}</span>`:''}
            ${deadlineMeta}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:600;color:${fc}">${proj.overallPct}%</div>
          <div style="font-size:11px;color:var(--text3);font-family:DM Mono,monospace">overall progress</div>
        </div>
      </div>
      <div style="margin-top:12px">
        <div class="track" style="height:6px"><div class="fill" style="width:${proj.overallPct}%;background:${fc}"></div></div>
      </div>
    </div>

    ${riskBanner}

    <div class="proj-page-stats">
      ${[
        {label:'Total products', val:proj.products.length, cls:''},
        {label:'Dispatched',     val:proj.products.filter(p=>p.isDispatched).length, cls:'c-green'},
        {label:'In progress',    val:proj.products.filter(p=>!p.isDispatched&&p.pct>0).length, cls:'c-blue'},
        {label:'Not started',    val:proj.products.filter(p=>p.pct===0&&!p.isDispatched).length, cls:'c-purple'},
      ].map(s=>`<div class="stat"><div class="stat-label">${s.label}</div><div class="stat-val ${s.cls}">${s.val}</div></div>`).join('')}
    </div>

    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:DM Mono,monospace;margin-bottom:12px">
      ${prods.length} Products — sorted by latest activity
    </div>
    ${prods.map(p=>renderProduct(p,proj.id)).join('')}
  `;
}

// ── Hash routing ──
function handleHash(){
  const hash=window.location.hash.replace('#','');
  if(hash.startsWith('project/')){
    const projId=hash.replace('project/','');
    if(allProjects.length){
      showProjectPage(projId);
    } else {
      // Wait for data then show
      const wait=setInterval(()=>{
        if(allProjects.length){ clearInterval(wait); showProjectPage(projId); }
      },100);
    }
  } else if(hash && !hash.startsWith('project/')){
    expandedId=hash;
    applyFilters();
  }
}

window.addEventListener('hashchange', handleHash);



// ── Filter Drawer (left) ─────────────────────────────────
let filterDrawerOpen = false;
let fSecOpen = { status: true, sort: false, dept: false };

function toggleFilterDrawer(){ filterDrawerOpen ? closeFilterDrawer() : openFilterDrawer(); }

function openFilterDrawer(){
  filterDrawerOpen = true;
  document.getElementById('filter-drawer').style.transform = 'translateX(0)';
  document.getElementById('filter-drawer-overlay').classList.add('open');
  document.getElementById('filter-drawer-btn').classList.add('active');
  renderFilterDrawer();
}

function closeFilterDrawer(){
  filterDrawerOpen = false;
  document.getElementById('filter-drawer').style.transform = 'translateX(-100%)';
  document.getElementById('filter-drawer-overlay').classList.remove('open');
  document.getElementById('filter-drawer-btn').classList.remove('active');
}

function toggleFSec(id){
  fSecOpen[id] = !fSecOpen[id];
  renderFilterDrawer();
}

function renderFilterDrawer(){
  const curSort = document.getElementById('sort-select') ? document.getElementById('sort-select').value : 'latestActivity';
  const curFilter = activeFilter || 'all';

  // Get dept list from live projects
  const deptMap = {};
  allProjects.forEach(proj => {
    if(proj.status==='completed'||proj.status==='not_started') return;
    proj.products.forEach(p => {
      if(!p.currentDept||p.isDispatched) return;
      if(!deptMap[p.currentDept]) deptMap[p.currentDept]=0;
      deptMap[p.currentDept]++;
    });
  });
  const depts = Object.entries(deptMap).sort((a,b)=>b[1]-a[1]);

  const statusItems = [
    {id:'fbtn-all',         val:'all',         label:'All live',     cls:'on'},
    {id:'fbtn-not-started', val:'not_started',  label:'Not started',  cls:'on-purple'},
    {id:'fbtn-wip',         val:'wip',          label:'WIP',          cls:'on'},
    {id:'fbtn-hold',        val:'hold',         label:'On hold',      cls:'on-amber'},
    {id:'fbtn-completed',   val:'completed',    label:'Completed',    cls:'on-green'},
    {id:'fbtn-activity',    val:'activity',     label:'● Activity',   cls:'on'},
  ];

  document.getElementById('filter-drawer-body').innerHTML = `

    <!-- Status filter -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleFSec('status')">
        <span class="d-sec-title">Status Filter</span>
        <span class="d-sec-meta"><span style="color:var(--blue)">${curFilter.replace('_',' ')}</span><span>${fSecOpen.status?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${fSecOpen.status?'block':'none'}">
        <div style="display:flex;flex-direction:column;gap:6px">
          ${statusItems.map(s=>`
            <button onclick="setFilter('${s.val}',{classList:{add:()=>{},remove:()=>{}}},'${s.cls}');syncFilterBtns();renderFilterDrawer();"
              style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;border-radius:8px;border:1px solid ${curFilter===s.val?'var(--blue)':'var(--border)'};background:${curFilter===s.val?'var(--blue-dim)':'var(--bg3)'};color:${curFilter===s.val?'var(--blue)':'var(--text2)'};cursor:pointer;text-align:left;transition:all .12s">
              ${s.label}
            </button>`).join('')}
        </div>
      </div>
    </div>

    <!-- By Department -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleFSec('dept')">
        <span class="d-sec-title">By Department</span>
        <span class="d-sec-meta"><span>${depts.length} active</span><span>${fSecOpen.dept?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${fSecOpen.dept?'block':'none'}">
        ${depts.length===0 ? '<div style="font-size:12px;color:var(--text3)">No active departments</div>' :
          `<div style="display:flex;flex-direction:column;gap:6px">
            ${depts.map(([dept,count])=>`
              <button onclick="setDeptFilterFromDrawer('${dept.replace(/'/g,"\'")}');renderFilterDrawer();"
                style="font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:background .12s"
                onmouseover="this.style.background='var(--bg4)'" onmouseout="this.style.background='var(--bg3)'">
                <span>${dept}</span>
                <span style="font-size:10px;font-family:DM Mono,monospace;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:999px">${count}</span>
              </button>`).join('')}
          </div>`
        }
      </div>
    </div>

    <!-- Sort -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleFSec('sort')">
        <span class="d-sec-title">Sort By</span>
        <span class="d-sec-meta"><span>${curSort.replace(/([A-Z])/g,' $1').toLowerCase().trim()}</span><span>${fSecOpen.sort?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${fSecOpen.sort?'block':'none'}">
        <select class="drawer-sort" onchange="changeSort(this.value);renderFilterDrawer();if(drawerOpen)renderDrawer();">
          <option value="latestActivity"  ${curSort==='latestActivity' ?'selected':''}>Latest Activity</option>
          <option value="oldestActivity"  ${curSort==='oldestActivity' ?'selected':''}>Oldest Activity</option>
          <option value="highestProgress" ${curSort==='highestProgress'?'selected':''}>Highest Progress</option>
          <option value="lowestProgress"  ${curSort==='lowestProgress' ?'selected':''}>Lowest Progress</option>
          <option value="newestProject"   ${curSort==='newestProject'  ?'selected':''}>Newest Project</option>
          <option value="oldestProject"   ${curSort==='oldestProject'  ?'selected':''}>Oldest Project</option>
        </select>
      </div>
    </div>
  `;
}

function setDeptFilterFromDrawer(dept){
  // Use existing showDeptSelector logic — directly set deptFilter and apply
  deptFilter = dept;
  activeFilter = 'dept';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amber','on-green','on-purple'));
  applyFilters();
  closeFilterDrawer();
}

function syncFilterBtns(){
  // Keep hidden fbtn elements in sync so existing setFilter logic still works
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amber','on-green','on-purple'));
}

// ── Drawer ──────────────────────────────────────────────
let drawerOpen = false;
let dSecOpen = { overview: false, sort: false };

function toggleDrawer(){ drawerOpen ? closeDrawer() : openDrawer(); }
function openDrawer(){
  drawerOpen = true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-toggle-btn').classList.add('active');
  renderDrawer();
}
function closeDrawer(){
  drawerOpen = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer-toggle-btn').classList.remove('active');
}
function toggleDSec(id){
  dSecOpen[id] = !dSecOpen[id];
  renderDrawer();
}

function renderDrawer(){
  const all = allProjects;
  const ns   = all.filter(p=>p.status==='not_started').length;
  const live = all.filter(p=>p.status!=='completed'&&p.status!=='not_started').length;
  const wip  = all.filter(p=>p.status==='wip').length;
  const hold = all.filter(p=>p.status==='hold').length;
  const done = all.filter(p=>p.status==='completed').length;
  const prods = all.reduce((s,p)=>s+p.products.length,0);
  const atRisk = all.filter(p=>{ const dl=getDeadlineInfo(p); return dl&&dl.isAtRisk; }).length;

  const curSort = document.getElementById('sort-select') ? document.getElementById('sort-select').value : 'latestActivity';

  document.getElementById('drawer-body').innerHTML = `
    <!-- Overview -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleDSec('overview')">
        <span class="d-sec-title">Production Overview</span>
        <span class="d-sec-meta"><span>${all.length} projects</span><span>${dSecOpen.overview?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${dSecOpen.overview?'block':'none'}">
        <div class="kpi-grid">
          ${[
            {label:'Not Started',   val:ns,    cls:'c-purple', sub:'awaiting production'},
            {label:'Live Projects', val:live,  cls:'c-blue',   sub:'wip + on hold'},
            {label:'WIP',           val:wip,   cls:'c-blue',   sub:'active this week'},
            {label:'On Hold',       val:hold,  cls:'c-amber',  sub:'no recent activity'},
            {label:'Completed',     val:done,  cls:'c-green',  sub:'dispatched'},
            {label:'At Risk',       val:atRisk,cls:'c-red',    sub:'deadline at risk'},
            {label:'Total Projects',val:all.length,cls:'',     sub:'all time'},
            {label:'Total Products',val:prods, cls:'',         sub:'across all projects'},
          ].map(k=>`<div class="kpi-tile">
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-val ${k.cls}">${k.val}</div>
            <div class="kpi-sub">${k.sub}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Sort -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleDSec('sort')">
        <span class="d-sec-title">Sort Order</span>
        <span class="d-sec-meta"><span>${curSort.replace(/([A-Z])/g,' $1').toLowerCase()}</span><span>${dSecOpen.sort?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${dSecOpen.sort?'block':'none'}">
        <select class="drawer-sort" onchange="changeSort(this.value);renderDrawer()">
          <option value="latestActivity"  ${curSort==='latestActivity' ?'selected':''}>Latest Activity</option>
          <option value="oldestActivity"  ${curSort==='oldestActivity' ?'selected':''}>Oldest Activity</option>
          <option value="highestProgress" ${curSort==='highestProgress'?'selected':''}>Highest Progress</option>
          <option value="lowestProgress"  ${curSort==='lowestProgress' ?'selected':''}>Lowest Progress</option>
          <option value="newestProject"   ${curSort==='newestProject'  ?'selected':''}>Newest Project</option>
          <option value="oldestProject"   ${curSort==='oldestProject'  ?'selected':''}>Oldest Project</option>
        </select>
      </div>
    </div>
  `;
}

// Init
loadData(false);
scheduleRefresh();
handleHash();
</script>
