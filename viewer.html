<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Viewer · Artenspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);
  --orange:#f05423;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.shell{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:9px}
.brand-logo{height:18px;width:auto}
.brand-div{width:1px;height:14px;background:var(--border2)}
.brand-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);display:flex;align-items:center;gap:6px}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hdr-link{font-size:12px;color:var(--text3);text-decoration:none;padding:6px 13px;border:1px solid var(--border);border-radius:999px;transition:all .15s}
.hdr-link:hover{color:var(--text);border-color:var(--border2)}
.hdr-btn{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);padding:6px 13px;border:1px solid var(--border2);border-radius:999px;background:transparent;cursor:pointer;transition:all .15s}
.hdr-btn:hover{background:var(--bg3);color:var(--text)}

/* Filters */
.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.filter-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.filter-select{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--blue)}
.search-input{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;width:100%}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text3)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:500}
.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}.c-green{color:var(--green)}.c-purple{color:var(--purple)}

/* Status filter pills */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{font-size:11px;padding:5px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;font-family:'DM Mono',monospace}
.pill:hover{border-color:var(--border2);color:var(--text2)}
.pill.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pill.on-amber{background:var(--amber);border-color:var(--amber);color:#000}
.pill.on-green{background:var(--green);border-color:var(--green);color:#000}
.pill.on-purple{background:var(--purple);border-color:var(--purple);color:#fff}

/* Project grid */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

/* Project card */
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.proj-card:hover{border-color:var(--border2)}
.proj-card.expanded{border-color:rgba(59,130,246,.3)}
.card-top{padding:15px 16px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:500;line-height:1.3}
.card-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.card-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:10px;padding:2px 8px;border-radius:999px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.b-wip{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-hold{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.b-done{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-ns{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.2)}

/* Progress */
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.prog-pct{font-family:'DM Mono',monospace;color:var(--text2)}
.track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px;transition:width .4s}

/* Tags row */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.dept-tag{font-size:11px;padding:2px 9px;border-radius:999px;background:var(--bg4);color:var(--text2);border:1px solid var(--border);display:flex;align-items:center;gap:4px}
.dept-dot-sm{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.poc-tag{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.activity-tag{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.activity-tag.stale{color:var(--amber)}
.expand-hint{font-size:11px;color:var(--text3);margin-top:8px;display:flex;align-items:center;gap:3px}

/* Expanded: product list */
.prod-section{border-top:1px solid var(--border);padding:13px 16px;background:rgba(0,0,0,.2)}
.prod-sec-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.prod-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px}
.prod-item:last-child{margin-bottom:0}
.prod-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:5px}
.prod-name{font-size:12px;font-weight:500}
.prod-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.prod-pct{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);white-space:nowrap}
.prod-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:4px 0 5px}
.prod-fill{height:100%;border-radius:2px}
.prod-dept{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:999px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2);font-family:'DM Mono',monospace;margin-bottom:4px}

/* History entries */
.hist-toggle{font-size:10px;color:var(--text3);cursor:pointer;font-family:'DM Mono',monospace;margin-top:5px;display:inline-flex;align-items:center;gap:3px}
.hist-toggle:hover{color:var(--text2)}
.history-list{margin-top:8px;border-left:2px solid var(--border);padding-left:10px}
.hist-entry{margin-bottom:8px}
.hist-entry:last-child{margin-bottom:0}
.hist-dept{font-size:11px;font-weight:500;color:var(--text2)}
.hist-comment{font-size:11px;color:var(--text3);margin-top:1px;line-height:1.4}
.hist-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}

/* Empty / loader */
.loader{padding:3rem;text-align:center;color:var(--text3)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:3rem;text-align:center;color:var(--text3);font-size:13px}

/* Last updated */
.last-updated{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-align:right;margin-bottom:10px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 2260.8 629.4" xmlns="http://www.w3.org/2000/svg">
        <style>.st0{fill:#F05423;}</style>
        <g><g>
          <path class="st0" d="M1329.1,402.7c126.7,0,253.5,0,381.1,0c0-21,0-41.9,0-63.9c-102.3,0-204.3,0-307,0c0-20.5,0-39.8,0-60.3c79.1,0,158.2,0,237.8,0c0-22,0-42.9,0-64.9c-79.4,0-158.5,0-237.9,0c0-20.4,0-39.8,0-60.2c102.6,0,204.6,0,307.2,0c0-21.9,0-42.9,0-64.8c-127.5,0-253.9,0-381.2,0C1329.1,193.3,1329.1,297.6,1329.1,402.7z"/>
          <path class="st0" d="M903.9,88.5v65.3c51.5-0.2,103.1-0.1,154.5-0.1c2.1,0,4.2,0.3,7.3,0.5v248.9h0.1h73.5h0.1V154.2c3.1-0.2,5.2-0.5,7.3-0.5c51.5,0,103.1-0.1,154.5,0.1V88.5c-66.3-0.3-132.5,0-198.8,0.1C1036.4,88.5,970.2,88.2,903.9,88.5z"/>
          <path class="st0" d="M208.2,88.4L94.1,402.7h78.8l101.6-280c4.2-11.6,20.6-11.6,24.8,0l101.6,280h78.8L365.7,88.4H208.2z"/>
          <path class="st0" d="M685.8,277.1h105.4c52.1,0,94.4-42.3,94.4-94.4s-42.3-94.4-94.4-94.4H506v314.3h74V152.9h201.9c16.4,0,29.8,13.3,29.8,29.8c0,16.4-13.3,29.8-29.8,29.8H680.4c-39,0-70.5,31.6-70.5,70.5c0,32.6,22.3,60.9,54,68.6l194.4,50.4l15.2-62.8l-189.1-49.1C676.7,288.2,678,277.1,685.8,277.1z"/>
          <path class="st0" d="M2092.7,88.3l0.1,280c-4.2,11.6-20.6,11.6-24.8,0l-55.9-95.3L1903.7,88.3h-0.1h-78.6h-0.1h-0.1h-78.6v314.3h74l-0.1-280c4.2-11.6,20.6-11.6,24.8,0l54.3,92.5l109.9,187.5h0.1h78.6h0.1h0.1h78.6V88.3H2092.7z"/>
        </g></g>
      </svg>
      <div class="brand-div"></div>
      <div class="brand-sub">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="sync-text">Loading...</span>
      </div>
    </div>
    <div class="hdr-right">
      <a class="hdr-link" href="entry.html">✏️ Entry Tool</a>
      <button class="hdr-btn" onclick="loadData()">↺ Refresh</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-row">
      <div class="filter-group" style="max-width:200px">
        <div class="filter-label">PMC</div>
        <select class="filter-select" id="pmc-filter" onchange="applyFilters()">
          <option value="">All PMCs</option>
        </select>
      </div>
      <div class="filter-group" style="max-width:200px">
        <div class="filter-label">BD</div>
        <select class="filter-select" id="bd-filter" onchange="applyFilters()">
          <option value="">All BDs</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-label">Search</div>
        <input class="search-input" id="search-box" type="text" placeholder="Project name or code..." oninput="applyFilters()">
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-row"></div>

  <!-- Status pills -->
  <div class="pills">
    <button class="pill on" id="pill-all"  onclick="setPill('all',this,'on')">All</button>
    <button class="pill" id="pill-wip"     onclick="setPill('wip',this,'on')">WIP</button>
    <button class="pill" id="pill-hold"    onclick="setPill('hold',this,'on-amber')">On Hold</button>
    <button class="pill" id="pill-ns"      onclick="setPill('not_started',this,'on-purple')">Not Started</button>
    <button class="pill" id="pill-done"    onclick="setPill('completed',this,'on-green')">Completed</button>
  </div>

  <!-- Last updated -->
  <div class="last-updated" id="last-updated"></div>

  <!-- Grid -->
  <div id="grid-area"><div class="loader"><span class="spin"></span>Loading project data...</div></div>

</div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbxw89g6fbnFJdJju5gPlhyBj1uCd8Ng92kh3UxtAAowk5S9RsmX6xZ6nRP1EMGslGGg/exec';
const REFRESH_MS = 120000; // 2 min auto-refresh

let allProjects = [];
let pmcNames = [];
let bdNames  = [];
let activePill = 'all';
let expandedId = null;
let expandedHist = {}; // productCode → bool
let refreshTimer = null;

// ── Load ──
async function loadData() {
  setDot('syncing');
  try {
    const res  = await fetch(API + '?type=viewer&t=' + Date.now());
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allProjects = data.projects || [];
    pmcNames    = data.pmcNames  || [];
    bdNames     = data.bdNames   || [];
    populateFilters();
    setDot('ok');
    const now = new Date();
    document.getElementById('sync-text').textContent =
      'Synced ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-updated').textContent =
      allProjects.length + ' projects · updated ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    applyFilters();
  } catch(e) {
    setDot('err');
    document.getElementById('sync-text').textContent = 'Failed to sync';
    document.getElementById('grid-area').innerHTML =
      '<div class="empty-state">Could not load data: ' + e.message + '</div>';
  }
}

function setDot(state) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('sync-text');
  if (state === 'ok')      { dot.style.background = '#22c55e'; }
  else if (state === 'err'){ dot.style.background = '#ef4444'; }
  else                     { dot.style.background = '#f59e0b'; txt.textContent = 'Syncing...'; }
}

function populateFilters() {
  const pmcSel = document.getElementById('pmc-filter');
  const bdSel  = document.getElementById('bd-filter');
  const curPmc = pmcSel.value;
  const curBd  = bdSel.value;
  pmcSel.innerHTML = '<option value="">All PMCs</option>' +
    pmcNames.filter(n => n && n !== '#N/A' && n !== '-').map(n => `<option value="${n}"${n===curPmc?' selected':''}>${n}</option>`).join('');
  bdSel.innerHTML  = '<option value="">All BDs</option>' +
    bdNames.filter(n => n && n !== '#N/A' && n !== '-').map(n => `<option value="${n}"${n===curBd?' selected':''}>${n}</option>`).join('');
}

// ── Filters ──
function setPill(status, el, cls) {
  activePill = status;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on','on-amber','on-green','on-purple'));
  el.classList.add(cls);
  applyFilters();
}

function applyFilters() {
  const pmc = document.getElementById('pmc-filter').value;
  const bd  = document.getElementById('bd-filter').value;
  const q   = (document.getElementById('search-box').value || '').toLowerCase().trim();

  let list = allProjects;
  if (pmc) list = list.filter(p => p.pmc === pmc);
  if (bd)  list = list.filter(p => p.bd  === bd);
  if (q)   list = list.filter(p =>
    (p.name||'').toLowerCase().includes(q) || (p.code||'').toLowerCase().includes(q));
  if (activePill !== 'all') list = list.filter(p => p.status === activePill);

  renderStats(list);
  renderGrid(list);
}

// ── Stats ──
function renderStats(list) {
  const s = [
    { label:'WIP',         val: list.filter(p=>p.status==='wip').length,         cls:'c-blue'   },
    { label:'On Hold',     val: list.filter(p=>p.status==='hold').length,        cls:'c-amber'  },
    { label:'Not Started', val: list.filter(p=>p.status==='not_started').length, cls:'c-purple' },
    { label:'Completed',   val: list.filter(p=>p.status==='completed').length,   cls:'c-green'  },
    { label:'Total',       val: list.length,                                      cls:''         },
  ];
  document.getElementById('stats-row').innerHTML = s.map(st =>
    `<div class="stat"><div class="stat-label">${st.label}</div><div class="stat-val ${st.cls}">${st.val}</div></div>`
  ).join('');
}

// ── Fill color ──
function fillColor(pct) {
  if (pct >= 100) return '#22c55e';
  if (pct >= 70)  return '#3b82f6';
  if (pct >= 40)  return '#f59e0b';
  return '#a855f7';
}

// ── Time ago ──
function timeAgo(iso) {
  if (!iso) return null;
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1)  return '< 1h ago';
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

// ── Grid ──
function renderGrid(list) {
  if (!list.length) {
    document.getElementById('grid-area').innerHTML =
      '<div class="empty-state">No projects match the current filters.</div>';
    return;
  }

  // Sort: wip first, then hold, not_started, completed; within each by lastActivity desc
  const order = { wip:0, hold:1, not_started:2, completed:3 };
  list = [...list].sort((a,b) => {
    const od = (order[a.status]||0) - (order[b.status]||0);
    if (od !== 0) return od;
    return new Date(b.lastActivity||0) - new Date(a.lastActivity||0);
  });

  document.getElementById('grid-area').innerHTML =
    '<div class="proj-grid">' + list.map(p => renderCard(p)).join('') + '</div>';
}

function renderCard(proj) {
  const isExpanded = expandedId === proj.code;
  const bCls  = { wip:'b-wip', hold:'b-hold', completed:'b-done', not_started:'b-ns' }[proj.status] || 'b-wip';
  const bLbl  = { wip:'WIP', hold:'ON HOLD', completed:'DONE', not_started:'NOT STARTED' }[proj.status] || '';
  const fc    = fillColor(proj.overallPct);
  const actStr = timeAgo(proj.lastActivity);
  const isStale = proj.isOnHold;

  // Find dominant dept
  const depts = [...new Set((proj.products||[]).map(p=>p.currentDept).filter(Boolean))];
  const deptTag = depts.length
    ? `<span class="dept-tag"><span class="dept-dot-sm"></span>${depts[0]}${depts.length>1?' +' + (depts.length-1):''}</span>`
    : '';

  const pocTag = [proj.pmc ? 'PMC: '+proj.pmc : '', proj.bd ? 'BD: '+proj.bd : ''].filter(Boolean).join(' · ');

  let expandedHtml = '';
  if (isExpanded) {
    const prods = [...(proj.products||[])].sort((a,b) => new Date(b.lastActivity||0)-new Date(a.lastActivity||0));
    expandedHtml = `<div class="prod-section">
      <div class="prod-sec-label">${prods.length} Product${prods.length!==1?'s':''}</div>
      ${prods.map(p => renderProdItem(p, proj.code)).join('')}
    </div>`;
  }

  return `<div class="proj-card${isExpanded?' expanded':''}" id="card-${proj.code}" onclick="toggleCard('${proj.code}')">
    <div class="card-top">
      <div class="card-head">
        <div>
          <div class="card-title">${proj.name || proj.code}</div>
          <div class="card-code">${proj.code}</div>
        </div>
        <div class="card-badges">
          <span class="badge ${bCls}">${bLbl}</span>
        </div>
      </div>
      <div class="prog-lbl"><span>Overall Progress</span><span class="prog-pct">${proj.overallPct}%</span></div>
      <div class="track"><div class="fill" style="width:${proj.overallPct}%;background:${fc}"></div></div>
      <div class="tags">
        ${deptTag}
        ${pocTag ? `<span class="poc-tag">${pocTag}</span>` : ''}
        ${actStr ? `<span class="activity-tag${isStale?' stale':''}">● ${actStr}</span>` : ''}
      </div>
      <div class="expand-hint">${isExpanded?'▲ Collapse':'▼ View products & history'}</div>
    </div>
    ${expandedHtml}
  </div>`;
}

function renderProdItem(p, projCode) {
  const fc  = fillColor(p.currentPct);
  const actStr = timeAgo(p.lastActivity);
  const uid = projCode + '__' + p.code;
  const showHist = expandedHist[uid];

  const histHtml = showHist && p.history && p.history.length
    ? `<div class="history-list">
        ${p.history.slice(0,8).map(h => `
          <div class="hist-entry">
            <div class="hist-dept">${h.dept || '—'}</div>
            ${h.comment ? `<div class="hist-comment">${h.comment}</div>` : ''}
            <div class="hist-time">${formatTs(h.timestamp)}</div>
          </div>`).join('')}
      </div>`
    : '';

  return `<div class="prod-item" onclick="event.stopPropagation()">
    <div class="prod-head">
      <div>
        <div class="prod-name">${p.name || p.code}</div>
        <div class="prod-code">${p.code}${p.qty?' · Qty '+p.qty:''}</div>
      </div>
      <div class="prod-pct">${p.currentPct}%</div>
    </div>
    <div class="prod-track"><div class="prod-fill" style="width:${p.currentPct}%;background:${fc}"></div></div>
    ${p.currentDept ? `<span class="prod-dept">● ${p.currentDept}</span>` : ''}
    ${actStr ? `<div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:2px">${actStr}</div>` : ''}
    ${p.history && p.history.length
      ? `<div class="hist-toggle" onclick="toggleHist('${uid}')">
          ${showHist ? '▲ Hide' : '▼ Show'} ${p.history.length} update${p.history.length!==1?'s':''}
        </div>${histHtml}`
      : '<div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:4px">No entries yet</div>'}
  </div>`;
}

function formatTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ' · ' +
         d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function toggleCard(code) {
  expandedId = expandedId === code ? null : code;
  applyFilters();
  // Scroll card into view
  if (expandedId) {
    setTimeout(() => {
      const el = document.getElementById('card-' + code);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);
  }
}

function toggleHist(uid) {
  expandedHist[uid] = !expandedHist[uid];
  applyFilters();
}

// Auto-refresh
function scheduleRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadData, REFRESH_MS);
}

loadData();
scheduleRefresh();
</script>
</body>
</html>
