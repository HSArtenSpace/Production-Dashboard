<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Viewer · Artenspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.13);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.13);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.13);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.13);
  --orange:#f05423;
  --drawer-w:420px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column}

/* ── Page header ── */
.page-header{flex-shrink:0;padding:10px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:var(--bg)}
.header-left{display:flex;gap:8px;align-items:center}
.header-right{display:flex;gap:8px;align-items:center;justify-content:flex-end}
.brand-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;cursor:pointer}
.brand-logo{height:18px;width:auto}
.brand-sub{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);display:flex;align-items:center;gap:5px}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
.nav-btn{font-size:12px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.nav-btn:hover{background:var(--bg4);color:var(--text)}
.btn-panel{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-panel:hover{background:var(--bg4);color:var(--text)}
.btn-panel.active{border-color:var(--orange);color:var(--orange)}
.search{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);width:180px;outline:none}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}

/* ── Page body ── */
.page-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 20px 0}

/* ── Status pills + meta ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:11px;padding:4px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;font-family:'DM Mono',monospace}
.pill:hover{border-color:var(--border2);color:var(--text2)}
.pill.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pill.on-amber{background:var(--amber);border-color:var(--amber);color:#000}
.pill.on-green{background:var(--green);border-color:var(--green);color:#000}
.pill.on-purple{background:var(--purple);border-color:var(--purple);color:#fff}
.result-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}

/* ── Scrollable grid ── */
.grid-scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;padding-top:2px}

/* ── Cards ── */
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.proj-card:hover{border-color:var(--border2)}
.proj-card.expanded{border-color:rgba(59,130,246,.3)}
.card-top{padding:14px 15px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:9px}
.card-title{font-size:13px;font-weight:500;line-height:1.3}
.card-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.badge{font-size:10px;padding:2px 8px;border-radius:999px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.b-wip{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-hold{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.b-done{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-ns{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.prog-pct{font-family:'DM Mono',monospace;color:var(--text2)}
.track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;align-items:center}
.dept-tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--bg4);color:var(--text2);border:1px solid var(--border);display:flex;align-items:center;gap:3px}
.dept-dot-sm{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.poc-tag{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.act-tag{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.act-tag.stale{color:var(--amber)}
.expand-hint{font-size:10px;color:var(--text3);margin-top:7px;font-family:'DM Mono',monospace}

/* ── Products expand ── */
.prod-section{border-top:1px solid var(--border);padding:12px 15px;background:rgba(0,0,0,.2)}
.prod-sec-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.prod-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.prod-item:last-child{margin-bottom:0}
.prod-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}
.prod-name{font-size:12px;font-weight:500}
.prod-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.prod-pct{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);white-space:nowrap}
.prod-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:4px 0 4px}
.prod-fill{height:100%;border-radius:2px}
.prod-dept{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:999px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2);font-family:'DM Mono',monospace;margin-bottom:3px}
.hist-toggle{font-size:10px;color:var(--text3);cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;display:inline-flex;align-items:center;gap:3px}
.hist-toggle:hover{color:var(--text2)}
.history-list{margin-top:7px;border-left:2px solid var(--border);padding-left:10px}
.hist-entry{margin-bottom:7px}
.hist-entry:last-child{margin-bottom:0}
.hist-dept{font-size:11px;font-weight:500;color:var(--text2)}
.hist-comment{font-size:11px;color:var(--text3);margin-top:1px;line-height:1.4}
.hist-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}

/* ── Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;bottom:0;width:var(--drawer-w);background:var(--bg2);border-left:1px solid var(--border2);z-index:101;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.drawer-close{background:none;border:1px solid var(--border);color:var(--text3);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.drawer-close:hover{background:var(--bg3);color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:0}
.d-section{border-bottom:1px solid var(--border)}
.d-sec-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.d-sec-head:hover{background:rgba(255,255,255,.02)}
.d-sec-title{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text2)}
.d-sec-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace}
.d-sec-body{padding:8px 14px 14px}

/* KPI tiles inside drawer */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi-tile{background:var(--bg3);border-radius:8px;padding:9px 10px}
.kpi-label{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:500;line-height:1.1}
.kpi-sub{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}

/* Filter row inside drawer */
.filter-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.filter-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.filter-select{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;width:100%}
.filter-select:focus{border-color:var(--blue)}

/* Loader */
.loader{padding:3rem;text-align:center;color:var(--text3)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:3rem;text-align:center;color:var(--text3);font-size:13px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── View toggle ── */
.view-toggle{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:3px}
.vt-btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;border-radius:7px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.vt-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4)}

/* ── Date picker ── */
.date-wrap{display:flex;align-items:center;gap:6px}
.date-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)}
.date-input{font-family:'DM Mono',monospace;font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;cursor:pointer}
.date-input:focus{border-color:var(--blue)}

/* ── Copy all bar ── */
.copy-all-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:6px;flex-shrink:0;flex-wrap:wrap;gap:8px}
.copy-all-btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 16px;border-radius:8px;border:1px solid rgba(34,197,94,.3);background:var(--green-dim);color:var(--green);cursor:pointer;transition:all .15s;font-weight:500}
.copy-all-btn:hover{background:rgba(34,197,94,.2)}
.copy-all-btn.copied{border-color:var(--green);background:rgba(34,197,94,.25)}
.digest-meta{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}

/* ── Digest card ── */
.digest-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.digest-card:hover{border-color:var(--border2)}
.dc-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.dc-proj-name{font-size:14px;font-weight:600;line-height:1.3}
.dc-proj-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.dc-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.dc-pct{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2)}
.dc-body{padding:14px 16px}
.dc-message{font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap;word-break:break-word;font-family:'DM Sans',sans-serif}
.dc-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.copy-btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--blue);color:var(--blue)}
.copy-btn.copied{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.dc-poc{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)}

/* ── Digest grid ── */
.digest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

</style>
</head>
<body>

<!-- Page header -->
<div class="page-header">
  <div class="header-left">
    <a class="nav-btn" href="https://hsartenspace.github.io/Production-Dashboard/owner.html">⌂ Home</a>
    <a class="nav-btn" href="https://hsartenspace.github.io/Production-Dashboard/entry.html">✏️ Entry</a>
  </div>

  <a class="brand-link" onclick="location.reload()" href="#">
    <svg class="brand-logo" viewBox="0 0 2260.8 629.4" xmlns="http://www.w3.org/2000/svg">
      <style>.st0{fill:#F05423;}</style>

    </svg>
    <div class="brand-sub">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="sync-text">Loading...</span>
    </div>
  </a>

  <div class="header-right">
    <div class="view-toggle">
      <button class="vt-btn active" id="vt-progress" onclick="setView('progress')">Progress</button>
      <button class="vt-btn" id="vt-digest" onclick="setView('digest')">Digest</button>
    </div>
    <input class="search" type="text" id="search-box" placeholder="Search..." oninput="applyFilters()">
    <button class="btn-panel" id="drawer-toggle-btn" onclick="toggleDrawer()">☰ Summary panels</button>
  </div>
</div>

<!-- Page body -->
<div class="page-body">
  <!-- Digest toolbar (shown only in digest mode) -->
  <div id="digest-toolbar" style="display:none;flex-shrink:0;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px">
    <div class="copy-all-bar">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="date-wrap">
          <span class="date-label">Date</span>
          <input class="date-input" type="date" id="digest-date" onchange="loadDigestData()">
        </div>
        <span class="digest-meta" id="digest-meta"></span>
      </div>
      <button class="copy-all-btn" id="copy-all-btn" onclick="copyAll()">⎘ Copy all messages</button>
    </div>
  </div>

  <div class="top-bar" id="progress-toolbar">
    <div class="pills">
      <button class="pill on"  id="pill-all"  onclick="setPill('all',this,'on')">All</button>
      <button class="pill"     id="pill-wip"  onclick="setPill('wip',this,'on')">WIP</button>
      <button class="pill"     id="pill-hold" onclick="setPill('hold',this,'on-amber')">On Hold</button>
      <button class="pill"     id="pill-ns"   onclick="setPill('not_started',this,'on-purple')">Not Started</button>
      <button class="pill"     id="pill-done" onclick="setPill('completed',this,'on-green')">Completed</button>
    </div>
    <div class="result-meta" id="result-meta"></div>
  </div>
  <div class="grid-scroll">
    <div id="grid-area"><div class="loader"><span class="spin"></span>Loading...</div></div>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- Right drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Summary Panels</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="loader"><span class="spin"></span>Loading...</div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw89g6fbnFJdJju5gPlhyBj1uCd8Ng92kh3UxtAAowk5S9RsmX6xZ6nRP1EMGslGGg/exec';
const REFRESH_MS = 120000;

let allProjects=[], pmcNames=[], bdNames=[];
let activePill='all', expandedId=null, expandedHist={};
let drawerOpen=false;
let secOpen={overview:false, filters:false, dept:false};
let filterPmc='', filterBd='', filterDept='';

// VIEW TOGGLE & DIGEST MODE
// ══════════════════════════════════════════════════════════
let currentView = 'progress';
let digestProjects = [];
let digestDate = '';

function setView(v) {
  currentView = v;
  document.getElementById('vt-progress').classList.toggle('active', v === 'progress');
  document.getElementById('vt-digest').classList.toggle('active', v === 'digest');
  document.getElementById('progress-toolbar').style.display = v === 'progress' ? 'flex' : 'none';
  document.getElementById('digest-toolbar').style.display   = v === 'digest'   ? 'block' : 'none';
  if (v === 'digest') {
    if (!digestDate) {
      const today = new Date();
      digestDate = today.toISOString().substring(0, 10);
      document.getElementById('digest-date').value = digestDate;
    }
    loadDigestData();
  } else {
    applyFilters();
  }
}

async function loadDigestData() {
  digestDate = document.getElementById('digest-date').value;
  if (!digestDate) return;
  setDot('syncing');
  try {
    const res  = await fetch(API + '?type=viewer_all&date=' + digestDate + '&t=' + Date.now());
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    digestProjects = data.projects || [];
    setDot('ok');
    const fmt = new Date(digestDate + 'T12:00:00').toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
    document.getElementById('digest-meta').textContent = fmt + ' · ' + digestProjects.length + ' projects';
    renderDigest();
  } catch(e) {
    setDot('err');
    document.getElementById('grid-area').innerHTML = '<div class="empty-state">'+e.message+'</div>';
  }
}

// ── Message generator ─────────────────────────────────────

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}

function generateMessage(proj) {
  const lines = [];
  const today = digestDate;

  lines.push('Hello Sir/Madam,');
  lines.push('');
  lines.push('Production update for *' + (proj.name || proj.code) + '* — ' + fmtDate(today + 'T12:00:00'));
  lines.push('Overall Progress: ' + proj.overallPct + '%');
  lines.push('');

  const prods = [...(proj.products || [])].sort((a, b) => {
    // Updated today first, then by last activity
    if (a.updatedToday && !b.updatedToday) return -1;
    if (!a.updatedToday && b.updatedToday) return 1;
    return new Date(b.lastActivity || 0) - new Date(a.lastActivity || 0);
  });

  if (prods.length === 0) {
    lines.push('⏳ Production is yet to commence for this project.');
  } else {
    prods.forEach(p => {
      const name = p.name || p.code;
      if (!p.currentDept && !p.lastActivity) {
        // Never started
        lines.push('• ' + name + ': ⏳ Yet to commence');
      } else if (p.updatedToday) {
        // Had entry today
        let line = '• ' + name + ': ';
        if (p.prevDept && p.prevDept !== p.currentDept) {
          line += 'Moved to *' + p.currentDept + '*';
          line += ' (previously in ' + p.prevDept;
          if (p.prevDeptDate) line += ', since ' + fmtDate(p.prevDeptDate);
          line += ')';
        } else {
          line += 'Currently in *' + p.currentDept + '*';
          if (p.currentDeptSince) line += ' (since ' + fmtDate(p.currentDeptSince) + ')';
        }
        if (p.history && p.history[0] && p.history[0].comment) {
          line += '\n  ↳ ' + p.history[0].comment;
        }
        lines.push(line);
      } else {
        // No entry today — show last known state
        let line = '• ' + name + ': ';
        if (p.currentDept) {
          line += 'Still in *' + p.currentDept + '*';
          if (p.lastActivity) line += ' — last updated ' + fmtDate(p.lastActivity);
        } else {
          line += '⏳ Yet to commence';
        }
        lines.push(line);
      }
    });
  }

  lines.push('');
  if (proj.pmc || proj.bd) {
    const poc = [proj.pmc ? 'PMC: ' + proj.pmc : '', proj.bd ? 'BD: ' + proj.bd : ''].filter(Boolean).join(' · ');
    lines.push('_' + poc + '_');
  }

  return lines.join('\n');
}

// ── Render digest grid ─────────────────────────────────────

function renderDigest() {
  const q = (document.getElementById('search-box').value || '').toLowerCase().trim();
  let list = digestProjects;
  if (filterPmc)  list = list.filter(p => p.pmc === filterPmc);
  if (filterBd)   list = list.filter(p => p.bd  === filterBd);
  if (filterDept) list = list.filter(p => (p.products||[]).some(pr => pr.currentDept === filterDept));
  if (q) list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.code||'').toLowerCase().includes(q));

  // Sort: WIP first, hold, not_started, completed
  const order = {wip:0, hold:1, not_started:2, completed:3};
  list = [...list].sort((a, b) => (order[a.status]||0) - (order[b.status]||0));

  // Exclude completed
  list = list.filter(p => p.status !== 'completed');

  document.getElementById('result-meta').textContent = list.length + ' project' + (list.length !== 1 ? 's' : '');

  if (!list.length) {
    document.getElementById('grid-area').innerHTML = '<div class="empty-state">No projects match.</div>';
    return;
  }

  document.getElementById('grid-area').innerHTML =
    '<div class="digest-grid">' + list.map(proj => {
      const msg = generateMessage(proj);
      const bCls = {wip:'b-wip', hold:'b-hold', not_started:'b-ns'}[proj.status] || 'b-ns';
      const bLbl = {wip:'WIP', hold:'ON HOLD', not_started:'NOT STARTED'}[proj.status] || '';
      const fc   = proj.overallPct >= 70 ? '#3b82f6' : proj.overallPct >= 40 ? '#f59e0b' : '#a855f7';
      const pocStr = [proj.pmc ? 'PMC: '+proj.pmc : '', proj.bd ? 'BD: '+proj.bd : ''].filter(Boolean).join(' · ');
      return `<div class="digest-card">
        <div class="dc-header">
          <div>
            <div class="dc-proj-name">${proj.name || proj.code}</div>
            <div class="dc-proj-meta">${proj.code}${pocStr ? ' · ' + pocStr : ''}</div>
          </div>
          <div class="dc-badges">
            <span class="dc-pct">${proj.overallPct}%</span>
            <span class="badge ${bCls}">${bLbl}</span>
          </div>
        </div>
        <div class="dc-body">
          <div class="dc-message" id="msg-${proj.code}">${msg.replace(/\*([^*]+)\*/g,'<strong>$1</strong>').replace(/_([^_]+)_/g,'<em>$1</em>')}</div>
        </div>
        <div class="dc-footer">
          <span class="dc-poc" style="font-size:10px;color:var(--text3)">
            <span style="display:inline-block;width:${Math.min(proj.overallPct,100)}%;height:3px;background:${fc};border-radius:2px;min-width:2px;max-width:120px;vertical-align:middle;margin-right:4px"></span>
            ${proj.overallPct}% complete
          </span>
          <button class="copy-btn" onclick="copyMsg('${proj.code}',this)">⎘ Copy</button>
        </div>
      </div>`;
    }).join('') + '</div>';
}

function getMsgText(projCode) {
  const proj = digestProjects.find(p => p.code === projCode);
  return proj ? generateMessage(proj) : '';
}

function copyMsg(projCode, btn) {
  const text = getMsgText(projCode);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const q = (document.getElementById('search-box').value || '').toLowerCase().trim();
  let list = digestProjects.filter(p => p.status !== 'completed');
  if (filterPmc) list = list.filter(p => p.pmc === filterPmc);
  if (filterBd)  list = list.filter(p => p.bd  === filterBd);
  if (q) list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.code||'').toLowerCase().includes(q));

  const all = list.map(generateMessage).join('\n\n' + '─'.repeat(40) + '\n\n');
  navigator.clipboard.writeText(all).then(() => {
    const btn = document.getElementById('copy-all-btn');
    btn.textContent = '✓ All copied (' + list.length + ')';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Copy all messages'; btn.classList.remove('copied'); }, 3000);
  });
}

async function loadData(){
  setDot('syncing');
  try{
    const res=await fetch(API+'?type=viewer&t='+Date.now());
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    allProjects=data.projects||[];
    pmcNames=data.pmcNames||[];
    bdNames=data.bdNames||[];
    setDot('ok');
    document.getElementById('sync-text').textContent=
      'Synced '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' · '+allProjects.length+' projects';
    applyFilters();
    if(drawerOpen) renderDrawer();
  }catch(e){
    setDot('err');
    document.getElementById('sync-text').textContent='Failed';
    document.getElementById('grid-area').innerHTML='<div class="empty-state">'+e.message+'</div>';
  }
}

function setDot(s){
  const d=document.getElementById('conn-dot');
  if(s==='ok') d.style.background='#22c55e';
  else if(s==='err') d.style.background='#ef4444';
  else d.style.background='#f59e0b';
}

function setPill(s,el,cls){
  activePill=s;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on','on-amber','on-green','on-purple'));
  el.classList.add(cls);
  applyFilters();
}

function applyFilters(){
  if(currentView === 'digest'){ renderDigest(); return; }
  const q=(document.getElementById('search-box').value||'').toLowerCase().trim();
  let list=allProjects;
  if(filterPmc)  list=list.filter(p=>p.pmc===filterPmc);
  if(filterBd)   list=list.filter(p=>p.bd===filterBd);
  if(filterDept) list=list.filter(p=>(p.products||[]).some(pr=>pr.currentDept===filterDept));
  if(q) list=list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q));
  if(activePill!=='all') list=list.filter(p=>p.status===activePill);
  document.getElementById('result-meta').textContent=list.length+' project'+(list.length!==1?'s':'');
  renderGrid(list);
}

function fillColor(pct){
  if(pct>=100) return '#22c55e';
  if(pct>=70)  return '#3b82f6';
  if(pct>=40)  return '#f59e0b';
  return '#a855f7';
}
function timeAgo(iso){
  if(!iso) return null;
  const h=Math.floor((Date.now()-new Date(iso).getTime())/3600000);
  if(h<1) return '< 1h ago';
  if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function fmtTs(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function renderGrid(list){
  if(!list.length){
    document.getElementById('grid-area').innerHTML='<div class="empty-state">No projects match.</div>';
    return;
  }
  const order={wip:0,hold:1,not_started:2,completed:3};
  list=[...list].sort((a,b)=>{
    const od=(order[a.status]||0)-(order[b.status]||0);
    return od!==0?od:new Date(b.lastActivity||0)-new Date(a.lastActivity||0);
  });
  document.getElementById('grid-area').innerHTML='<div class="proj-grid">'+list.map(renderCard).join('')+'</div>';
}

function renderCard(proj){
  const isExp=expandedId===proj.code;
  const bCls={wip:'b-wip',hold:'b-hold',completed:'b-done',not_started:'b-ns'}[proj.status]||'b-wip';
  const bLbl={wip:'WIP',hold:'ON HOLD',completed:'DONE',not_started:'NOT STARTED'}[proj.status]||'';
  const fc=fillColor(proj.overallPct);
  const actStr=timeAgo(proj.lastActivity);
  const depts=[...new Set((proj.products||[]).map(p=>p.currentDept).filter(Boolean))];
  const deptTag=depts.length?`<span class="dept-tag"><span class="dept-dot-sm"></span>${depts[0]}${depts.length>1?' +'+(depts.length-1):''}</span>`:'';
  const pocTag=[proj.pmc?'PMC: '+proj.pmc:'',proj.bd?'BD: '+proj.bd:''].filter(Boolean).join(' · ');
  let expHtml='';
  if(isExp){
    const prods=[...(proj.products||[])].sort((a,b)=>new Date(b.lastActivity||0)-new Date(a.lastActivity||0));
    expHtml=`<div class="prod-section">
      <div class="prod-sec-label">${prods.length} Product${prods.length!==1?'s':''}</div>
      ${prods.map(p=>renderProd(p,proj.code)).join('')}
    </div>`;
  }
  return `<div class="proj-card${isExp?' expanded':''}" id="card-${proj.code}" onclick="toggleCard('${proj.code}')">
    <div class="card-top">
      <div class="card-head">
        <div><div class="card-title">${proj.name||proj.code}</div><div class="card-code">${proj.code}</div></div>
        <span class="badge ${bCls}">${bLbl}</span>
      </div>
      <div class="prog-lbl"><span>Progress</span><span class="prog-pct">${proj.overallPct}%</span></div>
      <div class="track"><div class="fill" style="width:${proj.overallPct}%;background:${fc}"></div></div>
      <div class="tags">
        ${deptTag}
        ${pocTag?`<span class="poc-tag">${pocTag}</span>`:''}
        ${actStr?`<span class="act-tag${proj.isOnHold?' stale':''}">● ${actStr}</span>`:''}
      </div>
      <div class="expand-hint">${isExp?'▲ collapse':'▼ products & history'}</div>
    </div>${expHtml}
  </div>`;
}

function renderProd(p,projCode){
  const fc=fillColor(p.currentPct);
  const uid=projCode+'__'+p.code;
  const sh=expandedHist[uid];
  const histHtml=sh&&p.history&&p.history.length?`<div class="history-list">
    ${p.history.slice(0,8).map(h=>`<div class="hist-entry">
      <div class="hist-dept">${h.dept||'—'}</div>
      ${h.comment?`<div class="hist-comment">${h.comment}</div>`:''}
      <div class="hist-time">${fmtTs(h.timestamp)}</div>
    </div>`).join('')}
  </div>`:'';
  return `<div class="prod-item" onclick="event.stopPropagation()">
    <div class="prod-head">
      <div><div class="prod-name">${p.name||p.code}</div><div class="prod-code">${p.code}${p.qty?' · Qty '+p.qty:''}</div></div>
      <div class="prod-pct">${p.currentPct}%</div>
    </div>
    <div class="prod-track"><div class="prod-fill" style="width:${p.currentPct}%;background:${fc}"></div></div>
    ${p.currentDept?`<span class="prod-dept">● ${p.currentDept}</span>`:''}
    ${timeAgo(p.lastActivity)?`<div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:2px">${timeAgo(p.lastActivity)}</div>`:''}
    ${p.history&&p.history.length
      ?`<div class="hist-toggle" onclick="toggleHist('${uid}')">${sh?'▲ Hide':'▼ Show'} ${p.history.length} update${p.history.length!==1?'s':''}</div>${histHtml}`
      :'<div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:4px">No entries yet</div>'}
  </div>`;
}

function toggleCard(code){
  expandedId=expandedId===code?null:code;
  applyFilters();
  if(expandedId) setTimeout(()=>{const el=document.getElementById('card-'+code);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}
function toggleHist(uid){
  expandedHist[uid]=!expandedHist[uid];
  applyFilters();
}

// ── Drawer ──
function toggleDrawer(){ drawerOpen?closeDrawer():openDrawer(); }
function openDrawer(){
  drawerOpen=true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-toggle-btn').classList.add('active');
  renderDrawer();
}
function closeDrawer(){
  drawerOpen=false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer-toggle-btn').classList.remove('active');
}

function toggleSection(id){
  secOpen[id]=!secOpen[id];
  renderDrawer();
}

function renderDrawer(){
  const all=allProjects;
  const wip=all.filter(p=>p.status==='wip').length;
  const hold=all.filter(p=>p.status==='hold').length;
  const ns=all.filter(p=>p.status==='not_started').length;
  const done=all.filter(p=>p.status==='completed').length;
  const total=all.length;
  const prods=all.reduce((s,p)=>s+(p.products||[]).length,0);
  const avgPct=total?Math.round(all.reduce((s,p)=>s+p.overallPct,0)/total):0;

  const pmcOpts=pmcNames.filter(n=>n&&n!=='#N/A'&&n!=='-').map(n=>`<option value="${n}"${filterPmc===n?' selected':''}>${n}</option>`).join('');
  const bdOpts=bdNames.filter(n=>n&&n!=='#N/A'&&n!=='-').map(n=>`<option value="${n}"${filterBd===n?' selected':''}>${n}</option>`).join('');

  // Build dept list from live data
  const deptSet=new Set();
  allProjects.forEach(p=>(p.products||[]).forEach(pr=>{ if(pr.currentDept) deptSet.add(pr.currentDept); }));
  const depts=[...deptSet].sort();
  const deptOpts=depts.map(d=>`<option value="${d}"${filterDept===d?' selected':''}>${d}</option>`).join('');
  const anyFilter=filterPmc||filterBd||filterDept;

  document.getElementById('drawer-body').innerHTML=`

    <!-- Overview KPIs -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('overview')">
        <span class="d-sec-title">Production Overview</span>
        <span class="d-sec-meta"><span>${total} projects</span><span>${secOpen.overview?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${secOpen.overview?'block':'none'}">
        <div class="kpi-grid">
          ${[
            {label:'WIP',         val:wip,       cls:'color:var(--blue)',   sub:'active projects'},
            {label:'On Hold',     val:hold,       cls:'color:var(--amber)',  sub:'no recent activity'},
            {label:'Not Started', val:ns,         cls:'color:var(--purple)', sub:'awaiting production'},
            {label:'Completed',   val:done,       cls:'color:var(--green)',  sub:'dispatched'},
            {label:'Total',       val:total,      cls:'',                    sub:'all projects'},
            {label:'Products',    val:prods,      cls:'',                    sub:'across all projects'},
            {label:'Avg Progress',val:avgPct+'%', cls:'color:var(--blue)',   sub:'fleet average'},
          ].map(k=>`<div class="kpi-tile">
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-val" style="${k.cls}">${k.val}</div>
            <div class="kpi-sub">${k.sub}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Filter by PMC / BD -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('filters')">
        <span class="d-sec-title">Filter by PMC / BD</span>
        <span class="d-sec-meta"><span style="${filterPmc||filterBd?'color:var(--orange)':''}">${filterPmc||filterBd?'active':'all'}</span><span>${secOpen.filters?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${secOpen.filters?'block':'none'}">
        <div class="filter-group">
          <div class="filter-label">PMC</div>
          <select class="filter-select" onchange="setFilterPmc(this.value)">
            <option value="">All PMCs</option>${pmcOpts}
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">BD</div>
          <select class="filter-select" onchange="setFilterBd(this.value)">
            <option value="">All BDs</option>${bdOpts}
          </select>
        </div>
        ${filterPmc||filterBd?`<button onclick="setFilterPmc('');setFilterBd('');" style="font-size:11px;color:var(--red);background:var(--red-dim);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:DM Mono,monospace;width:100%">✕ Clear PMC / BD</button>`:''}
      </div>
    </div>

    <!-- Filter by Department -->
    <div class="d-section">
      <div class="d-sec-head" onclick="toggleSection('dept')">
        <span class="d-sec-title">Filter by Department</span>
        <span class="d-sec-meta"><span style="${filterDept?'color:var(--orange)':''}">${filterDept||'all'}</span><span>${secOpen.dept?'▾':'▸'}</span></span>
      </div>
      <div class="d-sec-body" style="display:${secOpen.dept?'block':'none'}">
        <div class="filter-group">
          <div class="filter-label">Current Department</div>
          <select class="filter-select" onchange="setFilterDept(this.value)">
            <option value="">All Departments</option>${deptOpts}
          </select>
        </div>
        <div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:-4px;margin-bottom:6px">Shows projects with at least one product in this dept</div>
        ${filterDept?`<button onclick="setFilterDept('')" style="font-size:11px;color:var(--red);background:var(--red-dim);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:DM Mono,monospace;width:100%">✕ Clear dept filter</button>`:''}
      </div>
    </div>

    ${anyFilter?`<div style="padding:12px 14px;border-top:1px solid var(--border)">
      <button onclick="clearFilters()" style="font-size:11px;color:var(--red);background:var(--red-dim);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;cursor:pointer;font-family:DM Mono,monospace;width:100%;font-weight:500">✕ Clear all filters</button>
    </div>`:''}
  `;
}

function setFilterPmc(v){ filterPmc=v; applyFilters(); renderDrawer(); }
function setFilterBd(v){  filterBd=v;  applyFilters(); renderDrawer(); }
function setFilterDept(v){ filterDept=v; applyFilters(); renderDrawer(); }
function clearFilters(){ filterPmc=''; filterBd=''; filterDept=''; applyFilters(); renderDrawer(); }

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
