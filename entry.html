<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Floor Entry · Artenspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--bg5:#2d2d2d;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --orange:#f05423;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overscroll-behavior:none}

.shell{max-width:680px;margin:0 auto;padding:20px 16px 80px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.brand{display:flex;align-items:center;gap:9px}
.brand-logo{height:18px;width:auto}
.brand-div{width:1px;height:14px;background:var(--border2)}
.brand-sub{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)}
.hdr-link{font-size:11px;color:var(--text3);text-decoration:none;padding:5px 11px;border:1px solid var(--border);border-radius:999px}

/* Mode cards */
.mode-section{margin-bottom:8px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mode-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .15s;text-align:center}
.mode-card:hover{border-color:var(--border2);background:var(--bg3)}
.mode-card.active{border-color:var(--blue);background:var(--blue-dim)}
.mode-icon{font-size:26px;margin-bottom:8px}
.mode-title{font-size:13px;font-weight:600;margin-bottom:4px}
.mode-desc{font-size:11px;color:var(--text3);line-height:1.4}
.mode-card.active .mode-desc{color:var(--text2)}

/* Section label */
.sec-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}

/* Dept buttons — floor mode */
.dept-grid-floor{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px}
.dept-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.dept-btn:hover{border-color:var(--border2);background:var(--bg3)}
.dept-btn.active{background:var(--blue-dim);border-color:rgba(59,130,246,.4)}
.dept-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .15s}
.dept-btn.active .dept-dot{background:var(--blue)}
.dept-btn-name{font-size:13px;font-weight:500}
.dept-btn-pct{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:auto}

/* Active dept bar */
.active-dept-bar{background:var(--blue-dim);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.adb-left{display:flex;align-items:center;gap:8px}
.adb-dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}
.adb-name{font-size:13px;font-weight:600;color:var(--blue)}
.adb-pct{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.adb-change{font-size:11px;color:var(--text3);cursor:pointer;padding:4px 10px;border:1px solid var(--border2);border-radius:999px;background:transparent;font-family:'DM Mono',monospace}

/* Search */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 36px 10px 36px;border-radius:9px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text3)}
.si-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.si-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;font-size:18px;line-height:1;display:none}
.si-clear.vis{display:block}

/* Project list */
.proj-list{border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.proj-row{border-bottom:1px solid var(--border);background:var(--bg2);transition:background .1s}
.proj-row:last-child{border-bottom:none}
.proj-row-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px}
.proj-row-header:hover{background:var(--bg3)}
.proj-row.expanded .proj-row-header{background:var(--bg3);border-bottom:1px solid var(--border)}
.proj-left{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.proj-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.proj-poc{font-size:10px;color:var(--text3);text-align:right}
.proj-chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.proj-row.expanded .proj-chevron{transform:rotate(180deg)}
.proj-submitted-tag{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2);font-family:'DM Mono',monospace}

/* Product picker (inline expand) */
.prod-picker{padding:12px 14px;background:var(--bg3);display:none}
.proj-row.expanded .prod-picker{display:block}
.prod-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-bottom:10px}
.prod-check-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .12s}
.prod-check-item:hover{border-color:var(--border2)}
.prod-check-item.checked{background:var(--blue-dim);border-color:rgba(59,130,246,.3)}
.pci-box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s}
.prod-check-item.checked .pci-box{background:var(--blue);border-color:var(--blue);color:#fff}
.pci-name{font-size:11px;font-weight:500;line-height:1.3}
.pci-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.pick-all-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pick-all-btn{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:999px;background:transparent;font-family:'DM Mono',monospace}
.pick-sel-count{font-size:10px;color:var(--blue);font-family:'DM Mono',monospace}
.pick-comment{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);outline:none;resize:none;min-height:56px;margin-bottom:8px;line-height:1.4}
.pick-comment:focus{border-color:var(--blue)}
.pick-comment::placeholder{color:var(--text3)}
.pick-submit-row{display:flex;gap:8px}
.pick-submit{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 16px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;transition:background .15s;flex:1}
.pick-submit:hover{background:#2563eb}
.pick-submit:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.pick-cancel{font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer}

/* Desk mode */
.desk-form{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.desk-proj-search{margin-bottom:14px}
.desk-selected-proj{background:var(--blue-dim);border:1px solid rgba(59,130,246,.25);border-radius:9px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dsp-name{font-size:13px;font-weight:500}
.dsp-meta{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:2px}
.dsp-change{font-size:11px;color:var(--text3);cursor:pointer;padding:3px 9px;border:1px solid var(--border2);border-radius:999px;background:transparent;font-family:'DM Mono',monospace}

/* Desk product rows */
.desk-prod-list{margin-bottom:14px}
.desk-prod-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:10px}
.desk-prod-row:hover{border-color:var(--border2)}
.desk-prod-row.checked{background:var(--blue-dim);border-color:rgba(59,130,246,.3)}
.dpr-box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s}
.desk-prod-row.checked .dpr-box{background:var(--blue);border-color:var(--blue);color:#fff}
.dpr-info{flex:1}
.dpr-name{font-size:12px;font-weight:500}
.dpr-code{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}

/* Dept optional tag */
.dept-opt-row{margin-bottom:14px}
.dept-opt-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.dept-opt-wrap{display:flex;flex-wrap:wrap;gap:6px}
.dept-tag-btn{font-size:11px;padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Mono',monospace;transition:all .12s}
.dept-tag-btn:hover{border-color:var(--border2);color:var(--text2)}
.dept-tag-btn.sel{background:var(--blue-dim);border-color:rgba(59,130,246,.4);color:var(--blue)}
.dept-tag-btn.clear-btn{color:var(--red);border-color:rgba(239,68,68,.2)}

/* Comment */
.comment-wrap{margin-bottom:14px}
.comment-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.comment-ta{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;border-radius:9px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;resize:none;min-height:70px;line-height:1.5}
.comment-ta:focus{border-color:var(--blue)}
.comment-ta::placeholder{color:var(--text3)}

/* Submit btn */
.submit-btn{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:12px;border-radius:9px;border:none;background:var(--blue);color:#fff;cursor:pointer;transition:background .15s}
.submit-btn:hover{background:#2563eb}
.submit-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(34,197,94,.3);color:var(--green)}
.toast.err{border-color:rgba(239,68,68,.3);color:var(--red)}

/* Misc */
.empty{font-size:12px;color:var(--text3);padding:20px;text-align:center}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.day-label{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:20px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 2260.8 629.4" xmlns="http://www.w3.org/2000/svg">
        <style>.st0{fill:#F05423;}</style>
        <g><g>
          <path class="st0" d="M1329.1,402.7c126.7,0,253.5,0,381.1,0c0-21,0-41.9,0-63.9c-102.3,0-204.3,0-307,0c0-20.5,0-39.8,0-60.3c79.1,0,158.2,0,237.8,0c0-22,0-42.9,0-64.9c-79.4,0-158.5,0-237.9,0c0-20.4,0-39.8,0-60.2c102.6,0,204.6,0,307.2,0c0-21.9,0-42.9,0-64.8c-127.5,0-253.9,0-381.2,0C1329.1,193.3,1329.1,297.6,1329.1,402.7z"/>
          <path class="st0" d="M903.9,88.5v65.3c51.5-0.2,103.1-0.1,154.5-0.1c2.1,0,4.2,0.3,7.3,0.5v248.9h0.1h73.5h0.1V154.2c3.1-0.2,5.2-0.5,7.3-0.5c51.5,0,103.1-0.1,154.5,0.1V88.5c-66.3-0.3-132.5,0-198.8,0.1C1036.4,88.5,970.2,88.2,903.9,88.5z"/>
          <path class="st0" d="M208.2,88.4L94.1,402.7h78.8l101.6-280c4.2-11.6,20.6-11.6,24.8,0l101.6,280h78.8L365.7,88.4H208.2z"/>
          <path class="st0" d="M685.8,277.1h105.4c52.1,0,94.4-42.3,94.4-94.4s-42.3-94.4-94.4-94.4H506v314.3h74V152.9h201.9c16.4,0,29.8,13.3,29.8,29.8c0,16.4-13.3,29.8-29.8,29.8H680.4c-39,0-70.5,31.6-70.5,70.5c0,32.6,22.3,60.9,54,68.6l194.4,50.4l15.2-62.8l-189.1-49.1C676.7,288.2,678,277.1,685.8,277.1z"/>
          <path class="st0" d="M2092.7,88.3l0.1,280c-4.2,11.6-20.6,11.6-24.8,0l-55.9-95.3L1903.7,88.3h-0.1h-78.6h-0.1h-0.1h-78.6v314.3h74l-0.1-280c4.2-11.6,20.6-11.6,24.8,0l54.3,92.5l109.9,187.5h0.1h78.6h0.1h0.1h78.6V88.3H2092.7z"/>
        </g></g>
      </svg>
      <div class="brand-div"></div>
      <div class="brand-sub">Floor Entry</div>
    </div>
    <a class="hdr-link" href="viewer.html">&#128202; Viewer</a>
  </div>

  <!-- Date -->
  <div class="day-label" id="day-label"></div>

  <!-- Mode selector -->
  <div class="mode-cards" id="mode-cards">
    <div class="mode-card" id="mode-floor" onclick="setMode('floor')">
      <div class="mode-icon">🏭</div>
      <div class="mode-title">Floor Round</div>
      <div class="mode-desc">Pick dept → select projects & products → quick log</div>
    </div>
    <div class="mode-card" id="mode-desk" onclick="setMode('desk')">
      <div class="mode-icon">💻</div>
      <div class="mode-title">Desk Update</div>
      <div class="mode-desc">Search project → pick products → optional dept + comment</div>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main-area"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw89g6fbnFJdJju5gPlhyBj1uCd8Ng92kh3UxtAAowk5S9RsmX6xZ6nRP1EMGslGGg/exec';

const FLOOR_DEPTS = [
  { name: 'Solid Wood',     pct: 30 },
  { name: 'Metal',          pct: 40 },
  { name: 'Upholstery',     pct: 55 },
  { name: 'Surface Finish', pct: 70 },
  { name: 'Packing',        pct: 94 },
];

const ALL_DEPTS = [
  { name: 'Designing',        pct: 5   },
  { name: 'Design Approval',  pct: 10  },
  { name: 'Production File',  pct: 15  },
  { name: 'Solid Wood',       pct: 30  },
  { name: 'Metal',            pct: 40  },
  { name: 'Upholstery',       pct: 55  },
  { name: 'Surface Finish',   pct: 70  },
  { name: 'Assembly',         pct: 80  },
  { name: 'QC',               pct: 88  },
  { name: 'Packing',          pct: 94  },
  { name: 'Dispatch',         pct: 97  },
  { name: 'Installation',     pct: 99  },
  { name: 'Handover',         pct: 100 },
];

// State
let mode = null;
let allProjects = [];
let filteredProjects = [];
let activeDept = null;
let expandedProject = null;
let selectedProducts = {}; // projectCode → Set of product codes
let productCache = {}; // projectCode → [products]
let submittedProjects = new Set(); // projectCode_dept combos submitted this session
let floorSearch = '';

// Desk state
let deskProjects = [];
let deskFiltered = [];
let deskSelected = null;
let deskProducts = [];
let deskChecked = new Set();
let deskDept = '';
let deskComment = '';

// ── Init ──
document.getElementById('day-label').textContent =
  new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

async function loadProjects() {
  if (allProjects.length) return;
  try {
    const res = await fetch(API + '?type=projects&t=' + Date.now());
    const data = await res.json();
    allProjects = data.projects || [];
    deskProjects = [...allProjects];
    filteredProjects = [...allProjects];
    deskFiltered = [...deskProjects];
  } catch(e) {
    showToast('Failed to load projects: ' + e.message, 'err');
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-floor').classList.toggle('active', m === 'floor');
  document.getElementById('mode-desk').classList.toggle('active', m === 'desk');
  if (m === 'floor') renderFloor();
  else renderDesk();
}

// ══════════════════════════════════════════════
// FLOOR MODE
// ══════════════════════════════════════════════

function renderFloor() {
  const area = document.getElementById('main-area');
  if (!allProjects.length) {
    area.innerHTML = '<div class="empty"><span class="spin"></span>Loading projects...</div>';
    loadProjects().then(() => renderFloor());
    return;
  }

  const deptBar = activeDept
    ? `<div class="active-dept-bar">
        <div class="adb-left">
          <div class="adb-dot"></div>
          <div class="adb-name">${activeDept.name}</div>
          <div class="adb-pct">${activeDept.pct}%</div>
        </div>
        <button class="adb-change" onclick="changeDept()">Change dept</button>
      </div>`
    : '';

  const deptPicker = !activeDept
    ? `<div class="sec-label">Select Department</div>
       <div class="dept-grid-floor">
         ${FLOOR_DEPTS.map(d => `
           <div class="dept-btn" onclick="selectFloorDept('${d.name}',${d.pct})">
             <div class="dept-dot"></div>
             <span class="dept-btn-name">${d.name}</span>
             <span class="dept-btn-pct">${d.pct}%</span>
           </div>`).join('')}
       </div>`
    : '';

  const projSection = activeDept
    ? `<div class="sec-label">Projects in <b>${activeDept.name}</b> today</div>
       <div class="search-wrap">
         <span class="si-icon">&#128269;</span>
         <input class="search-input" id="floor-search" type="text" placeholder="Search project..." value="${floorSearch}" oninput="onFloorSearch(this.value)">
         <span class="si-clear ${floorSearch ? 'vis' : ''}" onclick="clearFloorSearch()">&#215;</span>
       </div>
       <div class="proj-list" id="floor-proj-list">
         ${renderFloorProjects()}
       </div>`
    : '';

  area.innerHTML = deptPicker + deptBar + projSection;
}

function renderFloorProjects() {
  const list = filteredProjects;
  if (!list.length) return '<div class="empty">No projects found</div>';
  return list.map(p => {
    const key = p.code + '_' + (activeDept ? activeDept.name : '');
    const submitted = submittedProjects.has(key);
    const isExpanded = expandedProject === p.code;
    const prods = productCache[p.code] || p.products.filter(pr => pr.active);
    const selSet = selectedProducts[p.code] || new Set();

    return `<div class="proj-row${isExpanded ? ' expanded' : ''}" id="prow-${p.code}">
      <div class="proj-row-header" onclick="toggleFloorProject('${p.code}')">
        <div class="proj-left">
          <div class="proj-name">${p.name || p.code}</div>
          <div class="proj-meta">${p.code} · ${prods.length} product${prods.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="proj-right">
          ${submitted ? '<span class="proj-submitted-tag">✓ Done</span>' : ''}
          <div class="proj-poc">${p.pmc ? p.pmc : ''}</div>
          <span class="proj-chevron">▼</span>
        </div>
      </div>
      ${isExpanded ? renderProdPicker(p, prods, selSet) : ''}
    </div>`;
  }).join('');
}

function renderProdPicker(proj, prods, selSet) {
  const allSel = prods.length > 0 && selSet.size === prods.length;
  return `<div class="prod-picker">
    <div class="pick-all-row">
      <span class="sec-label" style="margin-bottom:0">Select products</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${selSet.size > 0 ? '<span class="pick-sel-count">' + selSet.size + ' selected</span>' : ''}
        <button class="pick-all-btn" onclick="togglePickAll('${proj.code}')">${allSel ? 'Deselect all' : 'Select all'}</button>
      </div>
    </div>
    <div class="prod-picker-grid">
      ${prods.map(pr => `
        <div class="prod-check-item${selSet.has(pr.code) ? ' checked' : ''}" onclick="toggleFloorProd('${proj.code}','${pr.code}')">
          <div class="pci-box">${selSet.has(pr.code) ? '✓' : ''}</div>
          <div>
            <div class="pci-name">${pr.name || pr.code}</div>
            <div class="pci-code">${pr.code}${pr.qty ? ' · ' + pr.qty : ''}</div>
          </div>
        </div>`).join('')}
    </div>
    <textarea class="pick-comment" id="comment-${proj.code}" placeholder="Observation (optional)..." rows="2"></textarea>
    <div class="pick-submit-row">
      <button class="pick-cancel" onclick="collapseProject('${proj.code}')">Cancel</button>
      <button class="pick-submit" onclick="submitFloorEntry('${proj.code}')" ${selSet.size === 0 ? 'disabled' : ''} id="psub-${proj.code}">
        Log ${selSet.size} product${selSet.size !== 1 ? 's' : ''} →
      </button>
    </div>
  </div>`;
}

function selectFloorDept(name, pct) {
  activeDept = { name, pct };
  filteredProjects = [...allProjects];
  floorSearch = '';
  expandedProject = null;
  renderFloor();
}

function changeDept() {
  activeDept = null;
  expandedProject = null;
  floorSearch = '';
  renderFloor();
}

function onFloorSearch(val) {
  floorSearch = val;
  document.querySelector('.si-clear') && document.querySelector('.si-clear').classList.toggle('vis', val.length > 0);
  const q = val.toLowerCase();
  filteredProjects = q
    ? allProjects.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q))
    : [...allProjects];
  document.getElementById('floor-proj-list').innerHTML = renderFloorProjects();
}

function clearFloorSearch() {
  floorSearch = '';
  filteredProjects = [...allProjects];
  renderFloor();
}

async function toggleFloorProject(code) {
  if (expandedProject === code) {
    expandedProject = null;
  } else {
    expandedProject = code;
    // Load products if not cached
    if (!productCache[code]) {
      try {
        const res = await fetch(API + '?type=products&code=' + code + '&t=' + Date.now());
        const data = await res.json();
        productCache[code] = data.products || [];
      } catch(e) {
        const proj = allProjects.find(p => p.code === code);
        productCache[code] = proj ? proj.products.filter(pr => pr.active) : [];
      }
      if (!selectedProducts[code]) selectedProducts[code] = new Set();
    }
  }
  document.getElementById('floor-proj-list').innerHTML = renderFloorProjects();
}

function collapseProject(code) {
  expandedProject = null;
  document.getElementById('floor-proj-list').innerHTML = renderFloorProjects();
}

function toggleFloorProd(projCode, prodCode) {
  if (!selectedProducts[projCode]) selectedProducts[projCode] = new Set();
  if (selectedProducts[projCode].has(prodCode)) selectedProducts[projCode].delete(prodCode);
  else selectedProducts[projCode].add(prodCode);
  // Re-render just this project row
  const proj = allProjects.find(p => p.code === projCode);
  const prods = productCache[projCode] || [];
  const selSet = selectedProducts[projCode];
  const rowEl = document.getElementById('prow-' + projCode);
  if (rowEl) {
    const picker = rowEl.querySelector('.prod-picker');
    if (picker) picker.outerHTML = renderProdPicker(proj, prods, selSet);
    // Re-attach
    rowEl.innerHTML = rowEl.querySelector('.proj-row-header').outerHTML + renderProdPicker(proj, prods, selSet);
  } else {
    document.getElementById('floor-proj-list').innerHTML = renderFloorProjects();
  }
}

function togglePickAll(projCode) {
  const prods = productCache[projCode] || [];
  if (!selectedProducts[projCode]) selectedProducts[projCode] = new Set();
  if (selectedProducts[projCode].size === prods.length) {
    selectedProducts[projCode].clear();
  } else {
    prods.forEach(p => selectedProducts[projCode].add(p.code));
  }
  document.getElementById('floor-proj-list').innerHTML = renderFloorProjects();
}

async function submitFloorEntry(projCode) {
  const selSet = selectedProducts[projCode];
  if (!selSet || selSet.size === 0) return;
  const btn = document.getElementById('psub-' + projCode);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving...'; }

  const proj = allProjects.find(p => p.code === projCode);
  const prods = productCache[projCode] || [];
  const comment = document.getElementById('comment-' + projCode)?.value || '';
  const dept = activeDept.name;
  const errors = [];

  for (const prodCode of selSet) {
    const prod = prods.find(p => p.code === prodCode);
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'entry',
          projectCode: projCode,
          projectName: proj?.name || projCode,
          productCode: prodCode,
          productName: prod?.name || prodCode,
          department: dept,
          comment,
        }),
      });
      const data = await res.json();
      if (data.error) errors.push(data.error);
    } catch(e) {
      errors.push(e.message);
    }
  }

  if (errors.length) {
    showToast('Some failed: ' + errors[0], 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Retry →'; }
    return;
  }

  submittedProjects.add(projCode + '_' + dept);
  selectedProducts[projCode] = new Set();
  expandedProject = null;
  showToast('✓ ' + selSet.size + ' product' + (selSet.size !== 1 ? 's' : '') + ' logged for ' + (proj?.name || projCode), 'success');
  document.getElementById('floor-proj-list').innerHTML = renderFloorProjects();
}

// ══════════════════════════════════════════════
// DESK MODE
// ══════════════════════════════════════════════

function renderDesk() {
  const area = document.getElementById('main-area');
  if (!allProjects.length) {
    area.innerHTML = '<div class="empty"><span class="spin"></span>Loading projects...</div>';
    loadProjects().then(() => renderDesk());
    return;
  }

  let html = '<div class="desk-form">';

  if (!deskSelected) {
    html += `<div class="sec-label">Search Project</div>
      <div class="desk-proj-search">
        <div class="search-wrap">
          <span class="si-icon">&#128269;</span>
          <input class="search-input" id="desk-search" type="text" placeholder="Project name or code..." oninput="onDeskSearch(this.value)" autocomplete="off">
          <span class="si-clear" id="desk-clear" onclick="clearDeskSearch()">&#215;</span>
        </div>
        <div class="proj-list" id="desk-proj-list" style="margin-top:8px">${renderDeskProjList()}</div>
      </div>`;
  } else {
    html += `<div class="desk-selected-proj">
      <div>
        <div class="dsp-name">${deskSelected.name || deskSelected.code}</div>
        <div class="dsp-meta">${deskSelected.code}${deskSelected.pmc ? ' · ' + deskSelected.pmc : ''}</div>
      </div>
      <button class="dsp-change" onclick="clearDeskProject()">Change</button>
    </div>`;

    // Products
    html += `<div class="sec-label">Select Products</div>
      <div class="desk-prod-list">
        ${deskProducts.map(p => `
          <div class="desk-prod-row${deskChecked.has(p.code) ? ' checked' : ''}" onclick="toggleDeskProd('${p.code}')">
            <div class="dpr-box">${deskChecked.has(p.code) ? '✓' : ''}</div>
            <div class="dpr-info">
              <div class="dpr-name">${p.name || p.code}</div>
              <div class="dpr-code">${p.code}${p.qty ? ' · Qty ' + p.qty : ''}</div>
            </div>
          </div>`).join('')}
      </div>`;

    // Optional dept
    html += `<div class="dept-opt-row">
      <div class="dept-opt-label">Department <span style="color:var(--text3);font-size:9px">(optional)</span></div>
      <div class="dept-opt-wrap">
        ${ALL_DEPTS.map(d => `<button class="dept-tag-btn${deskDept === d.name ? ' sel' : ''}" onclick="setDeskDept('${d.name}')">${d.name}</button>`).join('')}
        ${deskDept ? '<button class="dept-tag-btn clear-btn" onclick="setDeskDept(\'\')">✕ Clear</button>' : ''}
      </div>
    </div>`;

    // Comment
    html += `<div class="comment-wrap">
      <div class="comment-label">Comment <span style="color:var(--text3);font-size:9px">(optional)</span></div>
      <textarea class="comment-ta" id="desk-comment" placeholder="Notes, observations, delivery updates..." oninput="deskComment=this.value">${deskComment}</textarea>
    </div>`;

    const canSubmit = deskChecked.size > 0;
    html += `<button class="submit-btn" onclick="submitDeskEntry()" ${canSubmit ? '' : 'disabled'} id="desk-submit-btn">
      Submit ${deskChecked.size > 0 ? deskChecked.size + ' product' + (deskChecked.size !== 1 ? 's' : '') : ''} →
    </button>`;
  }

  html += '</div>';
  area.innerHTML = html;
}

function renderDeskProjList() {
  const list = deskFiltered.slice(0, 40);
  if (!list.length) return '<div class="empty">No projects found</div>';
  return list.map(p => `
    <div class="proj-item" onclick="selectDeskProject('${p.code}')" style="padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;transition:background .1s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
      <div>
        <div style="font-size:13px;font-weight:500">${p.name || p.code}</div>
        <div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin-top:2px">${p.code} · ${p.products.filter(pr=>pr.active).length} products</div>
      </div>
      <div style="font-size:10px;color:var(--text3);text-align:right">${p.pmc || ''}</div>
    </div>`).join('');
}

function onDeskSearch(val) {
  document.getElementById('desk-clear').classList.toggle('vis', val.length > 0);
  const q = val.toLowerCase();
  deskFiltered = q
    ? deskProjects.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q))
    : [...deskProjects];
  const list = document.getElementById('desk-proj-list');
  if (list) list.innerHTML = renderDeskProjList();
}

function clearDeskSearch() {
  const inp = document.getElementById('desk-search');
  if (inp) inp.value = '';
  document.getElementById('desk-clear').classList.remove('vis');
  deskFiltered = [...deskProjects];
  const list = document.getElementById('desk-proj-list');
  if (list) list.innerHTML = renderDeskProjList();
}

async function selectDeskProject(code) {
  deskSelected = allProjects.find(p => p.code === code);
  deskChecked = new Set();
  deskDept = '';
  deskComment = '';
  // Load products
  if (!productCache[code]) {
    try {
      const res = await fetch(API + '?type=products&code=' + code + '&t=' + Date.now());
      const data = await res.json();
      productCache[code] = data.products || [];
    } catch(e) {
      productCache[code] = deskSelected.products.filter(pr => pr.active);
    }
  }
  deskProducts = productCache[code];
  renderDesk();
}

function clearDeskProject() {
  deskSelected = null;
  deskProducts = [];
  deskChecked = new Set();
  deskDept = '';
  deskComment = '';
  deskFiltered = [...deskProjects];
  renderDesk();
}

function toggleDeskProd(code) {
  if (deskChecked.has(code)) deskChecked.delete(code);
  else deskChecked.add(code);
  renderDesk();
}

function setDeskDept(name) {
  deskDept = name;
  renderDesk();
}

async function submitDeskEntry() {
  if (deskChecked.size === 0) return;
  const btn = document.getElementById('desk-submit-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving...'; }

  const errors = [];
  for (const prodCode of deskChecked) {
    const prod = deskProducts.find(p => p.code === prodCode);
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'entry',
          projectCode:  deskSelected.code,
          projectName:  deskSelected.name || deskSelected.code,
          productCode:  prodCode,
          productName:  prod?.name || prodCode,
          department:   deskDept || '',
          comment:      deskComment,
        }),
      });
      const data = await res.json();
      if (data.error) errors.push(data.error);
    } catch(e) {
      errors.push(e.message);
    }
  }

  if (errors.length) {
    showToast('Some failed: ' + errors[0], 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Retry →'; }
    return;
  }

  const count = deskChecked.size;
  const name = deskSelected.name;
  showToast('✓ ' + count + ' product' + (count !== 1 ? 's' : '') + ' logged for ' + name, 'success');
  // Reset but keep project selected for quick follow-up
  deskChecked = new Set();
  deskDept = '';
  deskComment = '';
  renderDesk();
}

// ── Toast ──
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Start ──
loadProjects();
</script>
</body>
</html>
